<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumas Visuales - ESMATE U2</title>
    <style>
        :root {
            --esmate-blue: #4361ee; --bg-color: #f8f9fa; --text-dark: #2b2d42;
            --correct-color: #2d6a4f; --incorrect-color: #d90429;
            --box-green: #81b29a;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); color: var(--text-dark); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        .header { width: 100%; max-width: 800px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; z-index: 10; }
        .btn-back { background: white; border: 1px solid #ccc; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; color: #555; text-decoration: none; font-size: 14px;}
        
        .screen { display: none; width: 100%; max-width: 700px; flex-direction: column; align-items: center; animation: fadeIn 0.4s; z-index: 10;}
        .screen.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .game-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); width: 100%; text-align: center; box-sizing: border-box; }
        
        button.primary { background-color: var(--esmate-blue); color: white; border: none; padding: 12px 24px; font-weight: bold; font-size: 18px; border-radius: 10px; cursor: pointer; width: 100%; transition: 0.2s; margin-top: 10px;}
        button.primary:hover { background-color: #3f37c9; }
        button.secondary { background-color: #f4a261; color: white; border: none; padding: 12px 24px; font-weight: bold; font-size: 18px; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 10px; }
        
        .btn-cheat { background-color: #2b2d42; color: #00ff00; border: 2px dashed #00ff00; padding: 10px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 15px; cursor: pointer; display: none; }

        .correct-cell { background-color: #d8f3dc !important; border-color: var(--correct-color) !important; color: var(--correct-color) !important; }
        .error-cell { background-color: #ffccd5 !important; border-color: var(--incorrect-color) !important; color: var(--incorrect-color) !important; }

        .visual-container { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 20px 0; flex-wrap: wrap;}
        .emoji-box { border: 3px solid var(--box-green); border-radius: 15px; padding: 15px; min-width: 100px; min-height: 80px; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 5px; font-size: 30px; background: #f4fcf8; max-width: 250px;}
        .arrow-sign { font-size: 30px; color: var(--box-green); font-weight: bold; }
        
        .math-row { display: flex; justify-content: center; align-items: center; gap: 10px; margin: 20px 0; font-size: 24px; font-weight: bold; color: var(--text-dark); flex-wrap: wrap;}
        .math-input { width: 60px; height: 50px; text-align: center; font-size: 24px; font-weight: bold; border: 2px solid #ccc; border-radius: 10px; outline: none; transition: 0.3s; }
        .label-po { font-size: 28px; font-weight: 900; margin-right: 10px; color: var(--esmate-blue);}

        #feedback-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; box-sizing: border-box;}
        #feedback-content { background: white; padding: 30px; border-radius: 15px; text-align: center; max-width: 400px; width: 100%; animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div class="header">
        <a href="../../index.html" class="btn-back">⬅️ Menú</a>
        <div style="font-weight: bold; color: var(--esmate-blue); cursor: pointer; user-select: none;" id="jugador-nombre" onclick="activarModoPrueba()">👤 Estudiante</div>
    </div>

    <div id="screen-start" class="screen active">
        <div class="game-card">
            <h1 style="color: var(--esmate-blue); margin-top:0;">Unidad 2: Sumas Visuales</h1>
            
            <div id="save-menu" style="display: none; margin-top: 20px; background: #e0fbfc; padding: 15px; border-radius: 10px;">
                <p style="color: var(--correct-color); font-weight: bold; margin-top: 0;">¡Progreso encontrado!</p>
                <div id="btn-n2" style="display: none;"><button class="primary" onclick="iniciarNivel2()">🚀 Ir al Nivel 2 (Suma hasta 20)</button></div>
                <button class="secondary" style="background: white; color: #555; border: 1px solid #ccc; font-size: 14px;" onclick="iniciarNivel1()">🔄 Repasar Nivel 1</button>
            </div>

            <div id="new-menu">
                <p>Cuenta los objetos y completa la operación. ¡Mucha suerte!</p>
                <button class="primary" onclick="iniciarNivel1()">▶ Comenzar Nivel 1 (Hasta 10)</button>
            </div>
            
            <button class="btn-cheat cheat-element" onclick="localStorage.removeItem('esmate_u2_progreso_'+estudiante.nie); location.reload();">🗑️ Borrar progreso</button>
        </div>
    </div>

    <div id="screen-game" class="screen">
        <div class="game-card">
            <div style="display: flex; justify-content: space-between; font-weight: bold; color: #666; margin-bottom: 10px;">
                <span id="label-nivel">Nivel 1</span>
                <span>Ejercicio <span id="ronda-actual">1</span>/10</span>
                <span style="color: var(--incorrect-color)">Intentos: <span id="intentos-ui">2</span> ❤️</span>
            </div>
            
            <h3 style="margin: 0; color: #555;" id="instruccion">Cuenta y suma:</h3>
            
            <div class="visual-container">
                <div class="emoji-box" id="box-1"></div>
                <div class="arrow-sign">→  ←</div>
                <div class="emoji-box" id="box-2"></div>
            </div>

            <div class="math-row">
                <span class="label-po">PO:</span>
                <input type="tel" id="po-1" class="math-input" maxlength="2" autocomplete="off" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
                <span style="color:#888">＋</span>
                <input type="tel" id="po-2" class="math-input" maxlength="2" autocomplete="off" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
                <span style="color:#888">＝</span>
                <input type="tel" id="po-3" class="math-input" maxlength="2" autocomplete="off" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
            </div>

            <div class="math-row" style="margin-top: 10px;">
                <span class="label-po">R:</span>
                <input type="tel" id="r-1" class="math-input" maxlength="2" autocomplete="off" oninput="this.value=this.value.replace(/[^0-9]/g,'')" style="border-color: var(--esmate-blue);">
                <span id="obj-name" style="color: #666; font-size: 22px;">objetos.</span>
            </div>

            <button class="primary" id="btn-revisar" onclick="revisarEjercicio()">✅ Revisar</button>
            <button class="btn-cheat cheat-element" id="btn-cheat-win" onclick="autoGanar()">⏭️ GANAR NIVEL</button>
        </div>
    </div>

    <div id="screen-finale" class="screen">
        <div class="game-card" id="final-card" style="background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%); color: white; border: none;">
            <h1 id="final-titulo" style="font-size: 35px;">¡Felicidades!</h1>
            <p id="final-desc">Has completado los ejercicios.</p>
            <div style="font-size: 60px; margin: 20px 0;">🌟🏆🌟</div>
            <button class="primary" style="background: white; color: #2d6a4f;" onclick="window.location.href='../../index.html'">➡️ Volver al Salón de Trofeos</button>
        </div>
    </div>

    <div id="feedback-overlay"><div id="feedback-content"><div id="fb-icon" style="font-size: 60px; margin-bottom: 10px;">🏆</div><h2 id="fb-title" style="margin: 0; color: var(--text-dark);">¡Bien hecho!</h2><p id="fb-text" style="color: #555;"></p><button class="primary" id="fb-btn" onclick="cerrarFeedback()">Continuar</button></div></div>

    <script>
        const URL_BASE = "https://esmate-2026-default-rtdb.firebaseio.com/";
        let estudiante = { nombre: "Estudiante", nie: "0000", grado: "2" };
        let nivelActual = 1;
        let ronda = 1;
        let aciertos = 0;
        let fallos = 0;
        let intentosPermitidos = 2; // Solo 1 oportunidad extra
        let intentosUsados = 0;
        let solucion = {};
        const objetos = [
            { e: '🍎', n: 'manzanas' }, { e: '🍌', n: 'guineos' }, 
            { e: '⚽', n: 'pelotas' }, { e: '🚗', n: 'carros' },
            { e: '🍪', n: 'galletas' }, { e: '🍦', n: 'helados' }
        ];

        // MODO DESARROLLADOR
        let clics = 0;
        function activarModoPrueba() { clics++; if(clics===5) { let p=prompt("Clave:"); if(p==="rive2593") document.querySelectorAll('.cheat-element').forEach(b=>b.style.display='block'); } }
        function autoGanar() { aciertos = 10; finalizarNivel(); }

        window.onload = function() {
            let info = localStorage.getItem('estudiante_esmate');
            if(info) { estudiante = JSON.parse(info); document.getElementById('jugador-nombre').textContent = `👤 ${estudiante.nombre}`; }
            let progreso = localStorage.getItem('esmate_u2_progreso_' + estudiante.nie);
            if(progreso && parseInt(progreso) >= 2) { 
                document.getElementById('save-menu').style.display='block'; 
                document.getElementById('new-menu').style.display='none';
                document.getElementById('btn-n2').style.display='block';
            }
        };

        function iniciarNivel1() { nivelActual = 1; comenzarJuego(); }
        function iniciarNivel2() { nivelActual = 2; comenzarJuego(); }

        function comenzarJuego() {
            ronda = 1; aciertos = 0; fallos = 0;
            document.getElementById('label-nivel').textContent = "Nivel " + nivelActual;
            cambiarPantalla('screen-game');
            generarEjercicio();
        }

        function generarEjercicio() {
            intentosUsados = 0;
            document.getElementById('intentos-ui').textContent = (intentosPermitidos - intentosUsados);
            
            // Regla de máximos: N1 = 10, N2 = 20
            let maxTotal = (nivelActual === 1) ? 10 : 20;
            let v1 = Math.floor(Math.random() * (maxTotal - 2)) + 1;
            let v2 = Math.floor(Math.random() * (maxTotal - v1 - 1)) + 1;
            if(v1 + v2 > maxTotal) v2 = 1; // Seguridad

            let obj = objetos[Math.floor(Math.random()*objetos.length)];
            document.getElementById('box-1').textContent = obj.e.repeat(v1);
            document.getElementById('box-2').textContent = obj.e.repeat(v2);
            document.getElementById('obj-name').textContent = obj.n + ".";

            solucion = { p1: v1, p2: v2, p3: v1+v2, r: v1+v2 };

            ['po-1','po-2','po-3','r-1'].forEach(id => {
                let input = document.getElementById(id);
                input.value = ""; input.disabled = false;
                input.classList.remove('correct-cell', 'error-cell');
            });
            document.getElementById('ronda-actual').textContent = ronda;
            document.getElementById('po-1').focus();
        }

        function revisarEjercicio() {
            let inputs = ['po-1','po-2','po-3','r-1'];
            let correctos = 0;
            let sols = [solucion.p1, solucion.p2, solucion.p3, solucion.r];

            inputs.forEach((id, i) => {
                let input = document.getElementById(id);
                if(input.disabled) { correctos++; return; }
                if(parseInt(input.value) === sols[i]) {
                    input.classList.add('correct-cell'); input.classList.remove('error-cell');
                    input.disabled = true; correctos++;
                } else {
                    input.classList.add('error-cell');
                }
            });

            if(correctos === 4) {
                aciertos++; mostrarPopup("🌟", "¡Excelente!", "Lo hiciste muy bien.", avanzar);
            } else {
                intentosUsados++;
                document.getElementById('intentos-ui').textContent = (intentosPermitidos - intentosUsados);
                if(intentosUsados < intentosPermitidos) {
                    mostrarPopup("⚠️", "Inténtalo de nuevo", "Revisa los números que marcaste en rojo.", null);
                } else {
                    fallos++;
                    mostrarPopup("💔", "Se agotaron los intentos", `La respuesta era: ${solucion.p1} + ${solucion.p2} = ${solucion.p3}`, avanzar);
                }
            }
        }

        function avanzar() {
            ronda++;
            if(ronda > 10) finalizarNivel();
            else generarEjercicio();
        }

        function finalizarNivel() {
            guardarEnFirebase(`U2 - Nivel ${nivelActual}`, aciertos, fallos);
            if(aciertos >= 8) {
                if(nivelActual === 1) {
                    localStorage.setItem('esmate_u2_progreso_'+estudiante.nie, "2");
                    mostrarPopup("🏆", "¡Nivel 1 Superado!", "¡Eres un experto contando! Vamos al Nivel 2.", () => { iniciarNivel2(); });
                } else {
                    localStorage.setItem('esmate_u2_progreso_'+estudiante.nie, "3");
                    localStorage.setItem('esmate_show_progress', 'true');
                    cambiarPantalla('screen-finale');
                }
            } else {
                mostrarPopup("💪", "¡Casi!", `Tuviste ${aciertos}/10. Necesitas 8 para pasar.`, () => { comenzarJuego(); });
            }
        }

        function cambiarPantalla(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        
        let accionAlCerrar = null;
        function mostrarPopup(i, t, txt, f) {
            document.getElementById('fb-icon').textContent = i; document.getElementById('fb-title').textContent = t;
            document.getElementById('fb-text').textContent = txt; accionAlCerrar = f;
            document.getElementById('feedback-overlay').style.display = 'flex';
        }
        function cerrarFeedback() { document.getElementById('feedback-overlay').style.display = 'none'; if(accionAlCerrar) accionAlCerrar(); }
        
        function guardarEnFirebase(tema, a, f) {
            const p = { nombre: estudiante.nombre, grado: estudiante.grado, tema: tema, aciertos: a, fallos: f, fecha: new Date().toLocaleString('es-SV') };
            fetch(URL_BASE + "practicas.json", { method: "POST", body: JSON.stringify(p) });
        }
    </script>
</body>
</html>
