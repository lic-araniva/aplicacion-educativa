<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mate 2º - Secuencia hasta 100</title>
    <style>
        :root { --mate-blue: #4361ee; --mate-green: #2a9d8f; --mate-red: #d90429; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        
        .game-container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 600px; text-align: center; border-top: 10px solid var(--mate-blue); }
        .stats { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; font-size: 1.2rem; }
        .lives { color: var(--mate-red); font-size: 1.5rem; }
        
        .grid-numbers { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 20px 0; }
        .num-box { padding: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 1.5rem; font-weight: bold; text-align: center; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; box-sizing: border-box; }
        .input-num { width: 100%; border: none; text-align: center; font-size: 1.5rem; font-weight: bold; color: var(--mate-blue); outline: none; }
        .fixed { background: #e9ecef; color: #555; border-color: #ccc; }

        .btn-check { background: var(--mate-green); color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 1.2rem; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-check:hover { background: #21867a; transform: scale(1.02); }
        
        #message { margin-top: 15px; font-weight: bold; min-height: 24px; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: white; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="stats">
            <div>Decena: <span id="current-level">1</span>/10</div>
            <div class="lives" id="lives-display">❤️❤️❤️</div>
        </div>
        
        <h2>Completa la secuencia</h2>
        <p id="range-text">Números del 1 al 10</p>

        <div class="grid-numbers" id="grid"></div>

        <button class="btn-check" onclick="checkSequence()">Comprobar Decena</button>
        <div id="message"></div>
    </div>

    <div id="end-screen" class="overlay">
        <h1 id="end-title"></h1>
        <p id="end-score" style="font-size: 2rem;"></p>
        <button class="btn-check" style="width: 200px;" onclick="location.href='../../index.html'">Volver al Inicio</button>
    </div>

    <script>
        const URL_BASE = "https://esmate-2026-default-rtdb.firebaseio.com/";
        let estudiante = JSON.parse(localStorage.getItem('estudiante_esmate'));
        
        let lives = 3;
        let currentDecena = 1; // De 1 a 10
        let aciertos = 0;
        let fallos = 0;
        let secuenciaActual = [];

        // Iniciar juego
        window.onload = () => {
            if(!estudiante) { alert("Inicia sesión primero"); window.location.href="../../index.html"; return; }
            generateLevel();
        };

        function generateLevel() {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            document.getElementById('current-level').innerText = currentDecena;
            
            let start = (currentDecena - 1) * 10 + 1;
            let end = currentDecena * 10;
            document.getElementById('range-text').innerText = `Números del ${start} al ${end}`;
            
            secuenciaActual = [];
            // Definimos pistas (posiciones aleatorias 1 y 10)
            let hintPos = [0, 9]; 

            for(let i = 0; i < 10; i++) {
                let val = start + i;
                secuenciaActual.push(val);
                
                let box = document.createElement('div');
                box.className = "num-box";
                
                if(hintPos.includes(i)) {
                    box.classList.add('fixed');
                    box.innerText = val;
                } else {
                    box.innerHTML = `<input type="number" class="input-num" id="in-${i}" placeholder="?">`;
                }
                grid.appendChild(box);
            }
        }

        function checkSequence() {
            let correct = true;
            for(let i = 0; i < 10; i++) {
                let input = document.getElementById(`in-${i}`);
                if(input) {
                    if(parseInt(input.value) !== secuenciaActual[i]) {
                        correct = false;
                        input.style.color = "red";
                    } else {
                        input.style.color = "green";
                    }
                }
            }

            if(correct) {
                aciertos++;
                document.getElementById('message').innerText = "¡Excelente! 🎉";
                document.getElementById('message').style.color = "green";
                setTimeout(nextLevel, 1500);
            } else {
                lives--;
                fallos++;
                updateLives();
                document.getElementById('message').innerText = "Hay números incorrectos ❌";
                document.getElementById('message').style.color = "red";
                if(lives <= 0) finishGame("💔 ¡Te has quedado sin vidas!");
            }
        }

        function updateLives() {
            let hearts = "";
            for(let i=0; i<3; i++) hearts += (i < lives) ? "❤️" : "🖤";
            document.getElementById('lives-display').innerText = hearts;
        }

        function nextLevel() {
            document.getElementById('message').innerText = "";
            if(currentDecena < 10) {
                currentDecena++;
                generateLevel();
            } else {
                finishGame("🏆 ¡Lo lograste!");
            }
        }

        function finishGame(title) {
            const screen = document.getElementById('end-screen');
            const scoreText = document.getElementById('end-score');
            
            // Enviamos datos a Firebase
            let data = {
                nombre: estudiante.nombre,
                grado: estudiante.grado,
                tema: "Matemática - Secuencia hasta 100",
                aciertos: aciertos,
                fallos: fallos,
                fecha: new Date().toLocaleString()
            };

            fetch(URL_BASE + "practicas.json", {
                method: "POST",
                body: JSON.stringify(data)
            }).then(() => {
                document.getElementById('end-title').innerText = title;
                scoreText.innerText = `Puntuación: ${aciertos}/10`;
                screen.style.display = "flex";
            });
        }
    </script>
</body>
</html>
