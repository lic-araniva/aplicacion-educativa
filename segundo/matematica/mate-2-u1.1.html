<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mate 2º - Los números hasta el 100</title>
    <style>
        :root { --mate-blue: #4361ee; --mate-green: #2a9d8f; --mate-red: #d90429; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        
        /* Contenedor principal corregido */
        .game-container { 
            background: white; 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            width: 95%; 
            max-width: 500px; 
            text-align: center; 
            border-top: 10px solid var(--mate-blue); 
            margin-top: 20px;
        }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        .btn-exit { background: #6c757d; color: white; border: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        
        .stats { display: flex; gap: 15px; font-weight: bold; align-items: center; }
        .lives { color: var(--mate-red); font-size: 1.4rem; cursor: pointer; }
        
        /* Cuadros ajustados para que no sean gigantes */
        .grid-numbers { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 8px; 
            margin: 15px 0; 
        }
        .num-box { 
            border: 2px solid #ddd; 
            border-radius: 10px; 
            width: 100%; 
            aspect-ratio: 1/1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 1.4rem; 
            font-weight: bold;
        }
        
        .input-num { width: 100%; height: 100%; border: none; text-align: center; font-size: 1.5rem; font-weight: bold; color: var(--mate-blue); outline: none; background: transparent; }
        .fixed { background: #f1f3f5; color: #555; }

        .btn-check { background: var(--mate-green); color: white; border: none; padding: 15px; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; }
        
        #message { margin-top: 10px; font-weight: bold; font-size: 0.9rem; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); color: white; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="top-bar">
            <button class="btn-exit" onclick="salirGuardando()">⬅️ Salir</button>
            <div class="stats">
                <span>Decena: <b id="current-level">1</b>/10</span>
                <span class="lives" id="lives-display" onclick="modoDios()">❤️❤️❤️</span>
            </div>
        </div>
        
        <h2 style="color: var(--mate-blue); margin: 10px 0 5px 0; font-size: 1.4rem;">Los números hasta el 100</h2>
        <p id="range-text" style="color: #666; margin-bottom: 15px; font-size: 0.9rem;">Escribe del 1 al 10</p>

        <div class="grid-numbers" id="grid"></div>

        <button class="btn-check" onclick="checkSequence()">Comprobar Decena ✅</button>
        <div id="message"></div>
    </div>

    <div id="end-screen" class="overlay">
        <h1 id="end-title"></h1>
        <div id="medal-icon" style="font-size: 60px;"></div>
        <p id="end-score" style="font-size: 1.8rem;"></p>
        <button class="btn-check" style="width: 200px; background: var(--mate-blue);" onclick="window.location.href='../../index.html'">Finalizar</button>
    </div>

    <script>
        const URL_BASE = "https://esmate-2026-default-rtdb.firebaseio.com/";
        const NOMBRE_TEMA = "Los números hasta el 100";
        let estudiante = JSON.parse(localStorage.getItem('estudiante_esmate'));
        
        let lives = 3;
        let currentDecena = 1; 
        let aciertos = 0;
        let fallos = 0;
        let secuenciaActual = [];

        window.onload = async () => {
            if(!estudiante) { window.location.href="../../index.html"; return; }
            await cargarProgresoRemoto();
            generateLevel();
        };

        function modoDios() {
            if(confirm("¿Restaurar vidas?")) { lives = 3; updateLives(); }
        }

        async function cargarProgresoRemoto() {
            try {
                const res = await fetch(`${URL_BASE}progreso_temp/${estudiante.nie}.json`);
                const data = await res.json();
                if(data && data.tema === NOMBRE_TEMA) {
                    currentDecena = data.decena; aciertos = data.aciertos; fallos = data.fallos; lives = data.vidas;
                    updateLives();
                }
            } catch (e) {}
        }

        async function guardarProgresoNube() {
            const temp = { tema: NOMBRE_TEMA, decena: currentDecena, aciertos: aciertos, fallos: fallos, vidas: lives };
            await fetch(`${URL_BASE}progreso_temp/${estudiante.nie}.json`, { method: "PUT", body: JSON.stringify(temp) });
        }

        async function salirGuardando() {
            await guardarProgresoNube();
            window.location.href = "../../index.html";
        }

        function generateLevel() {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            document.getElementById('current-level').innerText = currentDecena;
            let start = (currentDecena - 1) * 10 + 1;
            let end = currentDecena * 10;
            document.getElementById('range-text').innerText = `Escribe del ${start} al ${end}`;
            
            secuenciaActual = [];
            for(let i = 0; i < 10; i++) {
                let val = start + i;
                secuenciaActual.push(val);
                let box = document.createElement('div');
                box.className = "num-box";
                if(i === 0 || i === 9) {
                    box.classList.add('fixed'); box.innerText = val;
                } else {
                    box.innerHTML = `<input type="number" class="input-num" id="in-${i}" inputmode="numeric">`;
                }
                grid.appendChild(box);
            }
        }

        async function checkSequence() {
            let error = false;
            for(let i = 0; i < 10; i++) {
                let input = document.getElementById(`in-${i}`);
                if(input && parseInt(input.value) !== secuenciaActual[i]) error = true;
            }

            if(!error) {
                aciertos++;
                document.getElementById('message').innerText = "¡Muy bien! 🚀";
                document.getElementById('message').style.color = "green";
                await guardarProgresoNube();
                setTimeout(nextLevel, 1000);
            } else {
                lives--; fallos++; updateLives();
                document.getElementById('message').innerText = "Revisa los rojos 🚩";
                document.getElementById('message').style.color = "red";
                if(lives <= 0) finishGame("Intentar de nuevo", "🥉");
            }
        }

        function updateLives() {
            let h = ""; for(let i=0; i<3; i++) h += (i < lives) ? "❤️" : "🖤";
            document.getElementById('lives-display').innerText = h;
        }

        function nextLevel() {
            if(currentDecena < 10) { currentDecena++; generateLevel(); document.getElementById('message').innerText = ""; } 
            else { finishGame("¡Excelente!", "🥇"); }
        }

        async function finishGame(title, med) {
            const data = { nombre: estudiante.nombre, grado: estudiante.grado, tema: NOMBRE_TEMA, aciertos, fallos, fecha: new Date().toLocaleString() };
            await fetch(URL_BASE + "practicas.json", { method: "POST", body: JSON.stringify(data) });
            await fetch(`${URL_BASE}progreso_temp/${estudiante.nie}.json`, { method: "DELETE" });
            document.getElementById('end-title').innerText = title;
            document.getElementById('medal-icon').innerText = med;
            document.getElementById('end-score').innerText = `${aciertos}/10`;
            document.getElementById('end-screen').style.display = "flex";
        }
    </script>
</body>
</html>
