<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mate 2º - Los números hasta el 100</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --mate-blue: #4361ee; --mate-green: #2a9d8f; --mate-red: #d90429; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; overflow-x: hidden; }
        
        .game-container { 
            background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            width: 95%; max-width: 400px; text-align: center; border-top: 10px solid var(--mate-blue); position: relative;
        }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .btn-exit { background: #6c757d; color: white; border: none; padding: 6px 10px; border-radius: 8px; cursor: pointer; font-size: 0.75rem; }
        .stats { display: flex; gap: 8px; font-weight: bold; font-size: 0.85rem; }
        .lives { color: var(--mate-red); font-size: 1.1rem; cursor: pointer; }
        
        /* Grilla Optimizada */
        .grid-numbers { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin: 10px 0; }
        
        /* Grilla Nivel 11 (Celdas más pequeñas) */
        .grid-100 { grid-template-columns: repeat(10, 1fr) !important; gap: 2px !important; }
        .grid-100 .num-box { border-width: 1px !important; border-radius: 2px !important; }
        .grid-100 .input-num { font-size: 0.65rem !important; }
        .grid-100 .fixed { font-size: 0.65rem !important; }

        .num-box { border: 1.5px solid #ddd; border-radius: 6px; width: 100%; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; background: white; }
        
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .input-num { width: 100%; height: 100%; border: none; text-align: center; font-size: 1.1rem; font-weight: bold; color: var(--mate-blue); outline: none; background: transparent; padding: 0; }
        .fixed { background: #f1f3f5; color: #555; font-size: 1.1rem; font-weight: bold; }

        .btn-check { background: var(--mate-green); color: white; border: none; padding: 12px; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; width: 100%; }
        #message { margin-top: 8px; font-weight: bold; font-size: 0.85rem; min-height: 18px; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); color: white; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; padding: 20px; }
        .star { font-size: 70px; color: gold; filter: drop-shadow(0 0 10px gold); margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="top-bar">
            <button class="btn-exit" onclick="salirGuardando()">⬅️ Salir</button>
            <div class="stats">
                <span>Nivel: <b id="current-level">1</b>/11</span>
                <span class="lives" id="lives-display" onclick="modoDios()">❤️❤️❤️</span>
            </div>
        </div>
        
        <h2 id="title-tema" style="color: var(--mate-blue); margin: 5px 0; font-size: 1.1rem;">Los números hasta el 100</h2>
        <p id="range-text" style="color: #666; margin-bottom: 8px; font-size: 0.8rem;">Cargando...</p>

        <div class="grid-numbers" id="grid"></div>

        <button class="btn-check" onclick="checkSequence()">Comprobar ✅</button>
        <div id="message"></div>
    </div>

    <div id="end-screen" class="overlay">
        <div class="star">⭐</div>
        <h1 id="end-title">¡LO LOGRASTE!</h1>
        <p id="end-score" style="font-size: 2.5rem; margin: 10px 0; color: gold;"></p>
        <p id="end-msg">¡Eres un experto en los números!</p>
        <button class="btn-check" style="width: 200px; background: var(--mate-blue); margin-top: 20px;" onclick="window.location.href='../../index.html'">Finalizar</button>
    </div>

    <script>
        const URL_BASE = "https://esmate-2026-default-rtdb.firebaseio.com/";
        const NOMBRE_TEMA = "Los números hasta el 100";
        let estudiante = JSON.parse(localStorage.getItem('estudiante_esmate'));
        
        let lives = 3;
        let currentDecena = 1; 
        let aciertos = 0;
        let fallos = 0;
        let secuenciaActual = [];

        window.onload = async () => {
            if(!estudiante) { window.location.href="../../index.html"; return; }
            await cargarProgresoRemoto();
            generateLevel();
        };

        function modoDios() {
            let secret = prompt(""); // Prompt vacío por seguridad
            if(secret === "rive2593") {
                lives = 3; updateLives();
                document.getElementById('message').innerText = "Vidas restauradas ✨";
            } else if(secret === "2593") {
                secuenciaActual.forEach((val, i) => {
                    let inp = document.getElementById(`in-${i}`);
                    if(inp) inp.value = val;
                });
                checkSequence();
            }
        }

        async function cargarProgresoRemoto() {
            try {
                const res = await fetch(`${URL_BASE}progreso_temp/${estudiante.nie}.json`);
                const data = await res.json();
                if(data && data.tema === NOMBRE_TEMA) {
                    currentDecena = data.decena; aciertos = data.aciertos; fallos = data.fallos; lives = data.vidas;
                    updateLives();
                }
            } catch (e) {}
        }

        async function guardarProgresoNube() {
            const temp = { tema: NOMBRE_TEMA, decena: currentDecena, aciertos, fallos, vidas: lives };
            await fetch(`${URL_BASE}progreso_temp/${estudiante.nie}.json`, { method: "PUT", body: JSON.stringify(temp) });
        }

        async function salirGuardando() {
            await guardarProgresoNube();
            window.location.href = "../../index.html";
        }

        function generateLevel() {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            grid.classList.remove('grid-100');
            document.getElementById('current-level').innerText = currentDecena;
            
            if(currentDecena <= 10) {
                let start = (currentDecena - 1) * 10 + 1;
                let end = currentDecena * 10;
                document.getElementById('range-text').innerText = `Decena del ${start} al ${end}`;
                secuenciaActual = Array.from({length: 10}, (_, i) => start + i);
                let hints = [0, 9]; 
                secuenciaActual.forEach((val, i) => {
                    let box = document.createElement('div');
                    box.className = "num-box";
                    if(hints.includes(i)) { box.classList.add('fixed'); box.innerText = val; }
                    else { box.innerHTML = `<input type="number" class="input-num" id="in-${i}" inputmode="numeric">`; }
                    grid.appendChild(box);
                });
            } else {
                grid.classList.add('grid-100');
                document.getElementById('range-text').innerText = "¡TABLA COMPLETA!";
                secuenciaActual = Array.from({length: 100}, (_, i) => i + 1);
                let hints = [1, 25, 50, 75, 100];
                secuenciaActual.forEach((val, i) => {
                    let box = document.createElement('div');
                    box.className = "num-box";
                    if(hints.includes(val)) { box.classList.add('fixed'); box.innerText = val; }
                    else { box.innerHTML = `<input type="number" class="input-num" id="in-${i}" inputmode="numeric">`; }
                    grid.appendChild(box);
                });
            }
        }

        async function checkSequence() {
            let error = false;
            secuenciaActual.forEach((val, i) => {
                let input = document.getElementById(`in-${i}`);
                if(input && parseInt(input.value) !== val) { error = true; input.style.color = "red"; }
                else if(input) { input.style.color = "green"; }
            });

            if(!error) {
                aciertos++;
                document.getElementById('message').innerText = "¡Excelente! 🚀";
                document.getElementById('message').style.color = "green";
                if(currentDecena < 11) {
                    await guardarProgresoNube();
                    setTimeout(() => { currentDecena++; generateLevel(); document.getElementById('message').innerText=""; }, 800);
                } else { finishGame(); }
            } else {
                lives--; fallos++; updateLives();
                document.getElementById('message').innerText = "¡Revisa tus respuestas!";
                document.getElementById('message').style.color = "red";
                if(lives <= 0) { alert("Game Over. ¡Inténtalo de nuevo!"); location.reload(); }
            }
        }

        function updateLives() {
            let h = ""; for(let i=0; i<3; i++) h += (i < lives) ? "❤️" : "🖤";
            document.getElementById('lives-display').innerText = h;
        }

        async function finishGame() {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            
            // Fórmula: aciertos * 0.9. Si es 9.9 redondea a 10.
            let notaFinal = aciertos * 0.9;
            if(notaFinal >= 9.8) notaFinal = 10;
            else notaFinal = notaFinal.toFixed(1);

            const data = { 
                nombre: estudiante.nombre, 
                grado: estudiante.grado, 
                tema: NOMBRE_TEMA, 
                aciertos: notaFinal, // Se guarda la nota calculada
                fallos: fallos, 
                fecha: new Date().toLocaleString() 
            };
            
            await fetch(URL_BASE + "practicas.json", { method: "POST", body: JSON.stringify(data) });
            await fetch(`${URL_BASE}progreso_temp/${estudiante.nie}.json`, { method: "DELETE" });
            
            document.getElementById('end-score').innerText = notaFinal;
            document.getElementById('end-screen').style.display = "flex";
        }
    </script>
</body>
</html>
