<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mate 2º - Los números hasta el 200 (4 Niveles)</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --mate-blue: #4361ee; --mate-green: #2a9d8f; --mate-red: #d90429; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; overflow-x: hidden; }
        
        .game-container { 
            background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            width: 95%; max-width: 420px; text-align: center; border-top: 10px solid var(--mate-blue); position: relative;
        }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .btn-exit { background: #6c757d; color: white; border: none; padding: 6px 10px; border-radius: 8px; cursor: pointer; font-size: 0.75rem; }
        .stats { display: flex; gap: 8px; font-weight: bold; font-size: 0.85rem; }
        .lives { color: var(--mate-red); font-size: 1.1rem; cursor: pointer; }
        
        .row-vecinos { display: flex; justify-content: center; align-items: center; gap: 8px; margin: 15px 0; }
        .grid-numbers { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin: 10px 0; }
        .grid-100 { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; margin: 10px 0; }

        .num-box { border: 2px solid #ddd; border-radius: 8px; width: 100%; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; background: white; font-size: 1.1rem; font-weight: bold; transition: 0.3s; }
        .grid-100 .num-box { font-size: 0.65rem !important; border-width: 1px; }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .input-num { width: 100%; height: 100%; border: none; text-align: center; font-size: 1.2rem; font-weight: bold; color: var(--mate-blue); outline: none; background: transparent; padding: 0; }
        .grid-100 .input-num { font-size: 0.65rem; }
        .fixed { background: #f1f3f5; color: #555; }
        
        .error-input { border-color: var(--mate-red) !important; background-color: #fff1f0; }

        .btn-check { background: var(--mate-green); color: white; border: none; padding: 14px; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; }
        #message { margin-top: 8px; font-weight: bold; font-size: 0.85rem; min-height: 20px; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); color: white; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; padding: 20px; }
        .star { font-size: 70px; color: gold; filter: drop-shadow(0 0 10px gold); margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="top-bar">
            <button class="btn-exit" onclick="salirGuardando()">⬅️ Salir</button>
            <div class="stats">
                <span id="label-nivel">Nivel 1</span>: <span id="label-sub">1/15</span>
                <span class="lives" id="lives-display" onclick="modoDios()">❤️❤️❤️</span>
            </div>
        </div>
        
        <h2 style="color: var(--mate-blue); margin: 5px 0; font-size: 1.1rem;">Los números hasta el 200</h2>
        <p id="range-text" style="color: #666; margin-bottom: 8px; font-size: 0.8rem;">Cargando...</p>

        <div id="game-area"></div>

        <button id="btn-main" class="btn-check" onclick="checkAction()">Comprobar ✅</button>
        <div id="message"></div>
    </div>

    <div id="end-screen" class="overlay">
        <div class="star">⭐</div>
        <h1 id="end-title">¡GENIAL!</h1>
        <p id="end-score" style="font-size: 3rem; margin: 10px 0; color: gold;"></p>
        <button class="btn-check" style="width: 200px; background: var(--mate-blue);" onclick="window.location.href='../../index.html'">Finalizar</button>
    </div>

    <script>
        const URL_BASE = "https://esmate-2026-default-rtdb.firebaseio.com/";
        const NOMBRE_TEMA = "Los números hasta el 200";
        let estudiante = JSON.parse(localStorage.getItem('estudiante_esmate'));
        
        let nivel = 1; 
        let subNivel = 1; 
        let vidas = 3;
        let aciertosNivel = 0;
        let bolsaNivel1 = [];
        let secuenciaActual = [];
        let notasFinales = [0, 0, 0, 0];

        window.onload = async () => {
            if(!estudiante) { window.location.href="../../index.html"; return; }
            generarBolsaNivel1();
            initLevel();
        };

        function generarBolsaNivel1() {
            let nums = Array.from({length: 98}, (_, i) => i + 2);
            bolsaNivel1 = nums.sort(() => Math.random() - 0.5).slice(0, 15);
        }

        function modoDios() {
            let s = prompt("");
            if(s === "rive2593") { vidas = 99; updateLives(); }
            else if(s === "2593") { saltar(); }
        }

        function saltar() {
            secuenciaActual.forEach((v, i) => {
                let inp = document.getElementById(`in-${i}`) || (i===0?document.getElementById('ante'):document.getElementById('suce'));
                if(inp) inp.value = v;
            });
            checkAction();
        }

        function initLevel() {
            const area = document.getElementById('game-area');
            area.innerHTML = ""; area.className = "";
            document.getElementById('message').innerText = "";
            document.getElementById('label-nivel').innerText = `Nivel ${nivel}`;
            updateLives();

            if(nivel === 1) {
                vidas = 3;
                document.getElementById('label-sub').innerText = `${subNivel}/15`;
                document.getElementById('range-text').innerText = "Anterior y Siguiente";
                let centro = bolsaNivel1[subNivel - 1];
                secuenciaActual = [centro - 1, centro + 1];
                area.innerHTML = `
                    <div class="row-vecinos">
                        <div class="num-box" id="box-ante"><input type="number" class="input-num" id="ante" oninput="limpiarRoja(this)"></div>
                        <div class="num-box fixed">${centro}</div>
                        <div class="num-box" id="box-suce"><input type="number" class="input-num" id="suce" oninput="limpiarRoja(this)"></div>
                    </div>`;
            } else if(nivel === 2) {
                vidas = 5;
                document.getElementById('label-sub').innerText = "Tabla 200";
                document.getElementById('range-text').innerText = "Completa la tabla (101-200)";
                area.className = "grid-100";
                secuenciaActual = Array.from({length: 100}, (_, i) => 101 + i);
                let hints = [101, 125, 150, 175, 200];
                secuenciaActual.forEach((val, i) => {
                    let box = document.createElement('div');
                    box.className = "num-box"; box.id = `box-${i}`;
                    if(hints.includes(val)) { box.classList.add('fixed'); box.innerText = val; }
                    else { box.innerHTML = `<input type="number" class="input-num" id="in-${i}" oninput="limpiarRoja(this)">`; }
                    area.appendChild(box);
                });
            } else {
                vidas = 3;
                document.getElementById('label-sub').innerText = `${subNivel}/10`;
                let base = (nivel === 3) ? 0 : 100;
                document.getElementById('range-text').innerText = `Decena ${subNivel}`;
                area.className = "grid-numbers";
                let start = base + (subNivel-1)*10 + 1;
                secuenciaActual = Array.from({length: 10}, (_, i) => start + i);
                let hints = [secuenciaActual[0], secuenciaActual[9]];
                secuenciaActual.forEach((val, i) => {
                    let box = document.createElement('div');
                    box.className = "num-box"; box.id = `box-${i}`;
                    if(hints.includes(val)) { box.classList.add('fixed'); box.innerText = val; }
                    else { box.innerHTML = `<input type="number" class="input-num" id="in-${i}" oninput="limpiarRoja(this)">`; }
                    area.appendChild(box);
                });
            }
            updateLives();
        }

        function limpiarRoja(input) {
            input.parentElement.classList.remove('error-input');
        }

        function checkAction() {
            let errorCount = 0;
            if(nivel === 1) {
                let a = document.getElementById('ante');
                let s = document.getElementById('suce');
                if(parseInt(a.value) !== secuenciaActual[0]) { a.parentElement.classList.add('error-input'); errorCount++; }
                if(parseInt(s.value) !== secuenciaActual[1]) { s.parentElement.classList.add('error-input'); errorCount++; }
            } else {
                secuenciaActual.forEach((val, i) => {
                    let inp = document.getElementById(`in-${i}`);
                    if(inp && parseInt(inp.value) !== val) {
                        inp.parentElement.classList.add('error-input');
                        errorCount++;
                    }
                });
            }

            if(errorCount === 0) {
                aciertosNivel++;
                document.getElementById('message').innerText = "¡Muy bien! ✨";
                document.getElementById('message').style.color = "green";
                setTimeout(siguientePaso, 1000);
            } else {
                vidas--;
                updateLives();
                document.getElementById('message').innerText = "¡Hay errores! Revisa los cuadros rojos.";
                document.getElementById('message').style.color = "red";
                
                if(vidas <= 0) {
                    alert("¡Se acabaron las vidas! Inténtalo de nuevo.");
                    if(nivel === 2) { aciertosNivel = 0; initLevel(); } 
                    else { siguientePaso(); } // Salta en N1, N3, N4 pero sin sumar acierto
                }
            }
        }

        function siguientePaso() {
            if(nivel === 1) {
                if(subNivel < 15) { subNivel++; initLevel(); }
                else { verificarNivel(10, 15); }
            } else if(nivel === 2) {
                notasFinales[1] = 10; nivel = 3; subNivel = 1; aciertosNivel = 0; initLevel();
            } else {
                if(subNivel < 10) { subNivel++; initLevel(); }
                else { verificarNivel(8, 10); }
            }
        }

        function verificarNivel(min, max) {
            let nota = (aciertosNivel / max) * 10;
            if(aciertosNivel >= min) {
                notasFinales[nivel-1] = nota;
                if(nivel < 4) { nivel++; subNivel = 1; aciertosNivel = 0; initLevel(); }
                else { final(); }
            } else {
                alert(`Solo tuviste ${aciertosNivel} correctas. Debes repetir el nivel ${nivel}.`);
                subNivel = 1; aciertosNivel = 0; initLevel();
            }
        }

        function updateLives() {
            let h = ""; for(let i=0; i<vidas; i++) h += "❤️";
            document.getElementById('lives-display').innerText = h || "💔";
        }

        async function final() {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            let prom = (notasFinales.reduce((a,b)=>a+b, 0) / 4).toFixed(1);
            if(prom >= 9.7) prom = 10;
            
            const data = { nombre: estudiante.nombre, grado: estudiante.grado, tema: NOMBRE_TEMA, aciertos: prom, fecha: new Date().toLocaleString() };
            await fetch(URL_BASE + "practicas.json", { method: "POST", body: JSON.stringify(data) });
            
            document.getElementById('end-score').innerText = prom;
            document.getElementById('end-screen').style.display = "flex";
        }

        function salirGuardando() { window.location.href = "../../index.html"; }
    </script>
</body>
</html>
