<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma Educativa Interactiva</title>
    <meta property="og:title" content="Plataforma Educativa Interactiva">
    <meta property="og:description" content="Aprende Matemática, Lenguaje, Ciencia y Ciudadanía de forma divertida.">
    <meta property="og:type" content="website">
    <style>f
        :root {
            --color-lenguaje: #e63946; --color-mate: #4361ee;
            --color-ciencia: #2a9d8f; --color-valores: #f4a261;
            --bg-color: #f8f9fa; --text-dark: #2b2d42;
            --gold: #ffbf00;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-dark); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .screen { display: none; width: 100%; max-width: 900px; flex-direction: column; align-items: center; animation: fadeIn 0.3s ease-in-out; }
        .screen.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header { width: 100%; display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 30px; flex-wrap: wrap; gap: 10px;}
        .header h1 { margin: 0; font-size: 28px; text-align: center; }
        .btn-back { position: absolute; left: 0; background: none; border: none; font-size: 16px; font-weight: bold; color: #555; cursor: pointer; padding: 10px; border-radius: 8px; transition: background 0.2s; }
        .btn-back:hover { background: #e9ecef; }

        .card-login { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 450px; border-top: 8px solid var(--color-mate); }
        .card-login input { width: 100%; padding: 15px; margin: 20px 0; border: 2px solid #ccc; border-radius: 10px; font-size: 20px; text-align: center; font-weight: bold; box-sizing: border-box; }
        .card-login input:focus { border-color: var(--color-mate); outline: none; }
        
        button.primary { background-color: var(--color-mate); color: white; border: none; padding: 15px 30px; font-weight: bold; font-size: 18px; border-radius: 10px; cursor: pointer; width: 100%; transition: 0.2s; }
        button.primary:hover { background-color: #3f37c9; }
        button.action-btn { background: #f4a261; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button.action-btn:hover { background: #e76f51; }

        .confirm-box { display: none; margin-top: 20px; padding: 20px; background: #e0fbfc; border-radius: 12px; border: 2px solid #90e0ef; }
        .btn-yes { background: #2d6a4f; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; width: 48%; }
        .btn-no { background: #d90429; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; width: 48%; }

        .grid-menu { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; width: 100%; justify-content: center; }
        .card { background: white; border-radius: 15px; padding: 30px 20px; text-align: center; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-top: 8px solid #ccc; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        .card h2 { margin: 10px 0 0 0; font-size: 22px; }
        .card-icon { font-size: 50px; }

        .card.lenguaje { border-color: var(--color-lenguaje); color: var(--color-lenguaje); }
        .card.mate { border-color: var(--color-mate); color: var(--color-mate); }
        .card.ciencia { border-color: var(--color-ciencia); color: var(--color-ciencia); }
        .card.valores { border-color: var(--color-valores); color: var(--color-valores); }

        /* ESTILOS PARA ASIGNACIONES */
        .assignment-box { width: 100%; background: #fff9db; border: 3px solid var(--gold); border-radius: 15px; padding: 20px; margin-bottom: 30px; box-sizing: border-box; display: none; }
        .assignment-title { display: flex; align-items: center; gap: 10px; color: #856404; font-weight: bold; margin-bottom: 15px; font-size: 18px; }
        .grid-assign { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
        .btn-task { background: white; border: 2px solid var(--gold); padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
        .btn-task:hover { background: var(--gold); color: white; }

        .grid-small { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; width: 100%; }
        .card-small { background: white; padding: 20px; border-radius: 10px; text-align: center; font-weight: bold; cursor: pointer; border: 2px solid #e9ecef;}
        .card-small:hover { border-color: var(--text-dark); background: #f1f3f5; }

        .student-table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-top: 10px; }
        .student-table th, .student-table td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
        .student-table th { background: var(--color-mate); color: white; }
        
        .unit-summary { background: #e0fbfc; border-left: 5px solid var(--color-mate); padding: 15px; border-radius: 8px; margin-bottom: 20px; width: 100%; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center;}
    </style>
</head>
<body>

    <div id="screen-login" class="screen active">
        <div class="card-login">
            <h1 style="margin-top: 0; color: var(--text-dark);">🎒 Acceso Estudiantes</h1>
            <p style="color: #666;">Ingresa tu código NIE para entrar.</p>
            <input type="number" id="nie-input" placeholder="Ej. 12345" autocomplete="off">
            <button class="primary" id="btn-buscar" onclick="buscarEstudiante()">🔍 Buscar mi nombre</button>
            <p id="nie-error" style="color: var(--color-lenguaje); display: none; margin-top: 15px; font-weight: bold;">❌ NIE no registrado.</p>
            <div id="confirmation-box" class="confirm-box">
                <h3>¿Eres <span id="student-name-confirm"></span>?</h3>
                <div style="display: flex; justify-content: space-between;">
                    <button class="btn-yes" onclick="confirmarLogin()">✅ Sí, soy yo</button>
                    <button class="btn-no" onclick="cancelarLogin()">❌ No</button>
                </div>
            </div>
        </div>
    </div>

    <div id="screen-subjects" class="screen">
        <div class="header" style="justify-content: space-between; width: 100%;">
            <div id="user-greeting" style="font-weight: bold; color: var(--color-mate); font-size: 20px;"></div>
            <div>
                <button class="action-btn" onclick="verMiProgreso()">🏆 Mi Progreso</button>
                <button onclick="cerrarSesion()" style="background: white; border: 1px solid #ccc; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; color: #555;">Salir</button>
            </div>
        </div>

        <div id="assignment-container" class="assignment-box">
            <div class="assignment-title">📌 Tareas asignadas:</div>
            <div id="assignment-list" class="grid-assign"></div>
        </div>

        <h1 style="margin-bottom: 30px;">📚 Elige tu Materia</h1>
        <div class="grid-menu">
            <div class="card lenguaje" onclick="selectSubject('Lenguaje', 'lenguaje')"><div class="card-icon">📖</div><h2>Lenguaje</h2></div>
            <div class="card mate" onclick="selectSubject('Matemática', 'mate')"><div class="card-icon">📐</div><h2>Matemática</h2></div>
            <div class="card ciencia" onclick="selectSubject('Ciencia', 'ciencia')"><div class="card-icon">🔬</div><h2>Ciencia</h2></div>
            <div class="card valores" onclick="selectSubject('Ciudadanía y Valores', 'valores')"><div class="card-icon">🤝</div><h2>Valores</h2></div>
        </div>
    </div>

    <div id="screen-progress" class="screen">
        <div class="header"><button class="btn-back" onclick="goTo('screen-subjects')">⬅️ Volver</button><h1>🏆 Mi Salón de Trofeos</h1></div>
        <div id="progress-content" style="width: 100%;"></div>
    </div>

    <div id="screen-grades" class="screen">
        <div class="header"><button class="btn-back" onclick="goTo('screen-subjects')">⬅️ Volver</button><h1 id="title-grades">Materia</h1></div>
        <div class="grid-menu" id="grades-container" style="max-width: 300px;"></div>
    </div>

    <div id="screen-units" class="screen">
        <div class="header"><button class="btn-back" onclick="goTo('screen-grades')">⬅️ Volver</button><h1 id="title-units">Grado</h1></div>
        <div class="grid-small" id="units-container"></div>
    </div>

    <script>
        const URL_BASE = "https://esmate-2026-default-rtdb.firebaseio.com/";
        let estudianteActual = null;

        const mapaGrados = { "1": "primero", "2": "segundo", "3": "tercero", "4": "cuarto", "5": "quinto", "6": "sexto" };
        const mapaCarpetasMateria = { "Lenguaje": "lenguaje", "Matemática": "matematica", "Ciencia": "ciencia", "Ciudadanía y Valores": "ciudadania" };
        const mapaPrefijosArchivo = { "Lenguaje": "lenguaje", "Matemática": "mate", "Ciencia": "ciencia", "Ciudadanía y Valores": "ciudadania" };

        window.onload = function() {
            let guardado = localStorage.getItem('estudiante_esmate');
            if(guardado) {
                estudianteActual = JSON.parse(guardado);
                document.getElementById('user-greeting').textContent = `👤 Hola, ${estudianteActual.nombre}`;
                ajustarMateriasPorGrado();
                buscarAsignaciones(); // 🎯 Buscar tareas al cargar
                if(localStorage.getItem('esmate_show_progress') === 'true') {
                    localStorage.removeItem('esmate_show_progress');
                    verMiProgreso(); 
                } else { goTo('screen-subjects'); }
            }
        };

        function buscarEstudiante() {
            const nie = document.getElementById('nie-input').value.trim();
            if (!nie) return;
            
            document.getElementById('btn-buscar').innerHTML = "⏳ Buscando...";
            document.getElementById('nie-error').style.display = 'none'; // Oculta errores viejos
            
            fetch(URL_BASE + `estudiantes/${nie}.json`).then(res => res.json()).then(datos => {
                document.getElementById('btn-buscar').innerHTML = "🔍 Buscar mi nombre";
                if (datos) {
                    estudianteActual = datos; estudianteActual.nie = nie;
                    document.getElementById('student-name-confirm').textContent = estudianteActual.nombre;
                    document.getElementById('confirmation-box').style.display = 'block';
                    document.getElementById('btn-buscar').style.display = 'none'; 
                    document.getElementById('nie-input').disabled = true; // Bloquea la caja
                } else { 
                    document.getElementById('nie-error').style.display = 'block'; 
                }
            });
        }

        function cancelarLogin() { 
            estudianteActual = null; 
            document.getElementById('confirmation-box').style.display = 'none'; 
            document.getElementById('btn-buscar').style.display = 'block'; 
            document.getElementById('nie-input').disabled = false; // Desbloquea la caja
            document.getElementById('nie-input').value = ""; // Borra el texto equivocado
            document.getElementById('nie-error').style.display = 'none'; // Limpia el error
            document.getElementById('nie-input').focus(); // Pone el cursor listo para escribir
        }

        function confirmarLogin() { 
            localStorage.setItem('estudiante_esmate', JSON.stringify(estudianteActual)); 
            document.getElementById('user-greeting').textContent = `👤 Hola, ${estudianteActual.nombre}`; 
            ajustarMateriasPorGrado(); 
            buscarAsignaciones(); // 🎯 Buscar tareas al confirmar
            goTo('screen-subjects'); 
        }

        function cerrarSesion() { localStorage.removeItem('estudiante_esmate'); location.reload(); }

        // ==========================================
        // MOTOR DE ASIGNACIONES (CLIENTE)
        // ==========================================
        function buscarAsignaciones() {
            if(!estudianteActual) return;
            fetch(URL_BASE + `asignaciones/${estudianteActual.nie}.json`).then(res => res.json()).then(datos => {
                const container = document.getElementById('assignment-container');
                const list = document.getElementById('assignment-list');
                
                if(datos) {
                    container.style.display = 'block';
                    let html = "";
                    for(let id in datos) {
                        let a = datos[id];
                        let ruta = `${mapaGrados[a.grado]}/${mapaCarpetasMateria[a.materia]}/${mapaPrefijosArchivo[a.materia]}-${a.grado}-u${a.unidad}.html`;
                        html += `
                            <div class="btn-task" onclick="window.location.href='${ruta}'">
                                <div style="font-size:30px;">⭐</div>
                                <div>
                                    <div style="font-size:12px; color:#666;">${a.grado}º Grado</div>
                                    <div style="color:var(--color-mate)">${a.materia} - Unidad ${a.unidad}</div>
                                </div>
                            </div>
                        `;
                    }
                    list.innerHTML = html;
                } else {
                    container.style.display = 'none';
                }
            });
        }

        function ajustarMateriasPorGrado() {
            let grado = estudianteActual.grado.toString();
            let visibilidad = (grado === "4" || grado === "5") ? "none" : ""; 
            document.querySelector('.card.lenguaje').style.display = visibilidad;
            document.querySelector('.card.ciencia').style.display = visibilidad;
            document.querySelector('.card.valores').style.display = visibilidad;
        }

        // --- NAVEGACIÓN NORMAL ---
        function selectSubject(name, colorClass) {
            document.getElementById('title-grades').textContent = name;
            document.getElementById('grades-container').innerHTML = `<div class="card ${colorClass}" onclick="selectGrade(${estudianteActual.grado})"><div class="card-icon">🎓</div><h2>${estudianteActual.grado}º Grado</h2></div>`;
            goTo('screen-grades');
        }
        function selectGrade(grade) {
            document.getElementById('title-units').textContent = grade + "º Grado";
            let html = "";
            for(let i=1; i<=10; i++) html += `<div class="card-small" onclick="selectUnit(${i}, ${grade})">Unidad ${i}</div>`;
            document.getElementById('units-container').innerHTML = html;
            goTo('screen-units');
        }
        function selectUnit(u, g) {
            let mat = document.getElementById('title-grades').textContent;
            window.location.href = `${mapaGrados[g]}/${mapaCarpetasMateria[mat]}/${mapaPrefijosArchivo[mat]}-${g}-u${u}.html`;
        }
        function goTo(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

        // --- PROGRESO (SIN CAMBIOS) ---
        function verMiProgreso() {
            goTo('screen-progress');
            document.getElementById('progress-content').innerHTML = "Cargando...";
            fetch(URL_BASE + "practicas.json").then(res => res.json()).then(datos => {
                let misPracticas = [];
                for (let id in datos) { if (datos[id].nombre === estudianteActual.nombre) misPracticas.push(datos[id]); }
                renderizarProgreso(misPracticas.reverse());
            });
        }
        function renderizarProgreso(practicas) {
            if(practicas.length === 0) { document.getElementById('progress-content').innerHTML = "<h3>No hay prácticas aún.</h3>"; return; }
            let html = `<table class="student-table"><tr><th>Fecha</th><th>Tema</th><th>Nota</th></tr>`;
            practicas.forEach(p => {
                let color = parseInt(p.aciertos) >= 6 ? "green" : "red";
                html += `<tr><td>${p.fecha.split(',')[0]}</td><td>${p.tema}</td><td style="color:${color}; font-weight:bold;">${p.aciertos}/10</td></tr>`;
            });
            document.getElementById('progress-content').innerHTML = html + "</table>";
        }
    </script>
</body>
</html>
