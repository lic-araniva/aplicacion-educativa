<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma Educativa Interactiva</title>
    <style>
        :root {
            --color-lenguaje: #e63946; --color-mate: #4361ee;
            --color-ciencia: #2a9d8f; --color-valores: #f4a261;
            --bg-color: #f8f9fa; --text-dark: #2b2d42;
            --gold: #ffbf00;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-dark); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .screen { display: none; width: 100%; max-width: 900px; flex-direction: column; align-items: center; animation: fadeIn 0.3s ease-in-out; }
        .screen.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card-login { background: white; padding: 35px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 450px; border-top: 8px solid var(--color-mate); }
        .card-login input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #ccc; border-radius: 10px; font-size: 18px; text-align: center; box-sizing: border-box; }
        
        .confirm-box { display: none; margin-top: 20px; padding: 20px; background: #e0fbfc; border-radius: 12px; border: 2px solid #90e0ef; }
        .btn-group { display: flex; justify-content: space-between; gap: 10px; margin-top: 15px; }
        
        button.primary { background-color: var(--color-mate); color: white; border: none; padding: 15px; font-weight: bold; border-radius: 10px; cursor: pointer; width: 100%; font-size: 16px; }
        .btn-yes { background: #2d6a4f; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; flex: 1; font-weight: bold; }
        .btn-no { background: #d90429; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; flex: 1; font-weight: bold; }

        .grid-menu { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; width: 100%; }
        .card { background: white; border-radius: 15px; padding: 30px 20px; text-align: center; cursor: pointer; border-top: 8px solid #ccc; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .grid-small { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; width: 100%; }
        .card-small { background: white; padding: 20px; border-radius: 10px; text-align: center; font-weight: bold; cursor: pointer; border: 2px solid #e9ecef; transition: 0.2s; }
        .card-small:hover { border-color: var(--color-mate); background: #f1f3f5; }
        
        .student-table { width: 100%; border-collapse: collapse; background: white; margin-top: 10px; border-radius: 10px; overflow: hidden; }
        .student-table th, .student-table td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
        .student-table th { background: var(--color-mate); color: white; }
    </style>
</head>
<body>

    <div id="screen-login" class="screen active">
        <div class="card-login">
            <h1 style="margin-top: 0;">🎒 Acceso Estudiantes</h1>
            <p>Ingresa tu código NIE para comenzar.</p>
            <input type="number" id="nie-input" placeholder="Ej. 1234567" autocomplete="off">
            <button class="primary" id="btn-buscar" onclick="buscarEstudiante()">🔍 Buscar mi nombre</button>
            
            <p id="nie-error" style="color: red; display: none; margin-top: 10px;">❌ NIE no encontrado.</p>

            <div id="confirmation-box" class="confirm-box">
                <h3>¿Eres <span id="student-name-confirm" style="color: var(--color-mate);"></span>?</h3>
                <div class="btn-group">
                    <button class="btn-no" onclick="cancelarLogin()">❌ No soy yo</button>
                    <button class="btn-yes" onclick="mostrarPassword()">✅ Sí, soy yo</button>
                </div>
            </div>

            <div id="pass-box" style="display: none; margin-top: 20px;">
                <p>Ingresa tu contraseña:</p>
                <input type="password" id="pass-input" placeholder="Contraseña">
                <button class="primary" onclick="verificarPassword()">🚀 Entrar</button>
            </div>
        </div>
    </div>

    <div id="screen-change-pass" class="screen">
        <div class="card-login" style="border-top-color: var(--color-valores);">
            <h1>🔒 Nueva Contraseña</h1>
            <p>Por seguridad, crea una clave secreta.</p>
            <input type="password" id="new-pass-input" placeholder="Nueva clave">
            <button class="primary" style="background-color: var(--color-valores);" onclick="guardarNuevaPassword()">💾 Guardar y Entrar</button>
        </div>
    </div>

    <div id="screen-subjects" class="screen">
        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center; margin-bottom: 20px;">
            <div id="user-greeting" style="font-weight: bold; color: var(--color-mate); font-size: 1.2rem;"></div>
            <div>
                <button onclick="verMiProgreso()" style="padding: 8px; cursor: pointer;">🏆 Mi Progreso</button>
                <button onclick="cerrarSesion()" style="padding: 8px; cursor: pointer;">Salir</button>
            </div>
        </div>
        <h1>📚 Elige tu Materia</h1>
        <div class="grid-menu">
            <div class="card" style="border-color: var(--color-mate);" onclick="selectSubject('Matemática', 'mate')">📐 Matemática</div>
            <div class="card" style="border-color: var(--color-lenguaje);" onclick="selectSubject('Lenguaje', 'lenguaje')">📖 Lenguaje</div>
        </div>
    </div>

    <div id="screen-grades" class="screen">
        <div style="width: 100%; position: relative; margin-bottom: 20px;">
            <button onclick="goTo('screen-subjects')" style="position: absolute; left: 0;">⬅️ Volver</button>
            <h1 id="title-grades" style="text-align: center; margin: 0;">Materia</h1>
        </div>
        <div class="grid-small" id="topics-container"></div>
    </div>

    <div id="screen-progress" class="screen">
        <div style="width: 100%; position: relative; margin-bottom: 20px;">
            <button onclick="goTo('screen-subjects')" style="position: absolute; left: 0;">⬅️ Volver</button>
            <h1 style="text-align: center; margin: 0;">🏆 Mis Logros</h1>
        </div>
        <div id="progress-content" style="width: 100%;"></div>
    </div>

    <script>
        const URL_BASE = "https://esmate-2026-default-rtdb.firebaseio.com/";
        let estudianteActual = null;
        let misAsignaciones = [];
        let nombresTemas = {};

        const mapaGrados = { "1": "primero", "2": "segundo", "3": "tercero", "4": "cuarto", "5": "quinto" };
        const mapaCarpetas = { "Matemática": "matematica", "Lenguaje": "lenguaje" };
        const mapaPrefijos = { "Matemática": "mate", "Lenguaje": "lenguaje" };

        window.onload = async () => {
            await cargarDiccionarioTemas();
            let guardado = localStorage.getItem('estudiante_esmate');
            if(guardado) { estudianteActual = JSON.parse(guardado); iniciarSesionExitosa(); }
        };

        async function cargarDiccionarioTemas() {
            try {
                const res = await fetch(`${URL_BASE}config/temas.json`);
                nombresTemas = await res.json() || {};
            } catch (e) { console.log("Error de conexión con diccionario"); }
        }

        function buscarEstudiante() {
            const nie = document.getElementById('nie-input').value.trim();
            if(!nie) return;
            document.getElementById('nie-error').style.display = 'none';
            
            fetch(`${URL_BASE}estudiantes/${nie}.json`).then(res => res.json()).then(datos => {
                if (datos) {
                    estudianteActual = { ...datos, nie };
                    document.getElementById('student-name-confirm').innerText = datos.nombre;
                    document.getElementById('confirmation-box').style.display = 'block';
                    document.getElementById('btn-buscar').style.display = 'none';
                    document.getElementById('nie-input').disabled = true;
                } else {
                    document.getElementById('nie-error').style.display = 'block';
                }
            });
        }

        function cancelarLogin() {
            estudianteActual = null;
            document.getElementById('confirmation-box').style.display = 'none';
            document.getElementById('btn-buscar').style.display = 'block';
            document.getElementById('nie-input').disabled = false;
            document.getElementById('nie-input').value = "";
        }

        function mostrarPassword() {
            document.getElementById('confirmation-box').style.display = 'none';
            document.getElementById('pass-box').style.display = 'block';
        }

        function verificarPassword() {
            const pass = document.getElementById('pass-input').value.trim();
            let pReal = estudianteActual.password || "2026";
            if(pass === pReal) {
                if(pass === "2026" || estudianteActual.debeCambiarPass) {
                    goTo('screen-change-pass');
                } else {
                    iniciarSesionExitosa();
                }
            } else {
                alert("Contraseña incorrecta ❌");
            }
        }

        async function guardarNuevaPassword() {
            let nueva = document.getElementById('new-pass-input').value.trim();
            if(nueva.length < 4) return alert("Usa al menos 4 letras o números.");
            estudianteActual.password = nueva;
            estudianteActual.debeCambiarPass = false;
            await fetch(`${URL_BASE}estudiantes/${estudianteActual.nie}.json`, {
                method: "PUT", body: JSON.stringify(estudianteActual)
            });
            iniciarSesionExitosa();
        }

        async function iniciarSesionExitosa() {
            localStorage.setItem('estudiante_esmate', JSON.stringify(estudianteActual));
            document.getElementById('user-greeting').innerText = `¡Hola, ${estudianteActual.nombre}! 👋`;
            
            // Cargar temas asignados
            const res = await fetch(`${URL_BASE}asignaciones/${estudianteActual.nie}.json`);
            const datos = await res.json();
            misAsignaciones = datos ? Object.values(datos) : [];
            
            goTo('screen-subjects');
        }

        function selectSubject(name, color) {
            document.getElementById('title-grades').innerText = name;
            let filtered = misAsignaciones.filter(a => a.materia === name);
            let html = "";
            
            if(filtered.length === 0) html = "<h3>No tienes temas activados aquí.</h3>";
            else {
                filtered.forEach(a => {
                    // 🚀 Diccionario aplicado para los nombres reales
                    let nombreMostrado = nombresTemas[a.tema] || `Tema ${a.tema}`;
                    let strGrado = mapaGrados[estudianteActual.grado];
                    let ruta = `${strGrado}/${mapaCarpetas[name]}/${mapaPrefijos[name]}-${estudianteActual.grado}-u${a.unidad}.${a.tema}.html`;
                    
                    html += `
                    <div class="card-small" onclick="window.location.href='${ruta}'">
                        <div style="font-size:12px; color:#666;">Unidad ${a.unidad}</div>
                        <div style="color:var(--color-mate); font-size:15px;">${nombreMostrado}</div>
                    </div>`;
                });
            }
            document.getElementById('topics-container').innerHTML = html;
            goTo('screen-grades');
        }

        async function verMiProgreso() {
            goTo('screen-progress');
            document.getElementById('progress-content').innerHTML = "Cargando...";
            const resPrac = await fetch(`${URL_BASE}practicas.json`);
            const datos = await resPrac.json();
            let html = `<table class="student-table"><tr><th>Fecha</th><th>Tema</th><th>Nota</th></tr>`;
            let hay = false;
            for(let id in datos) {
                if(datos[id].nombre === estudianteActual.nombre) {
                    hay = true;
                    html += `<tr><td>${datos[id].fecha.split(',')[0]}</td><td>${datos[id].tema}</td><td><b>${datos[id].aciertos}</b></td></tr>`;
                }
            }
            document.getElementById('progress-content').innerHTML = hay ? html + "</table>" : "<h3>Aún no tienes prácticas registradas.</h3>";
        }

        function goTo(id) { 
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); 
            document.getElementById(id).classList.add('active'); 
        }

        function cerrarSesion() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
