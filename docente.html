<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Docente - Administrador</title>
    <style>
        :root { --esmate-blue: #4361ee; --esmate-green: #2a9d8f; --esmate-red: #d90429; --esmate-orange: #f4a261; --bg-color: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: var(--esmate-blue); text-align: center; margin-top: 0;}
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #ccc; padding-bottom: 10px; flex-wrap: wrap; }
        .tab-btn { background: #e9ecef; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; color: #555; transition: 0.3s; }
        .tab-btn.active { background: var(--esmate-blue); color: white; }
        .tab-content { display: none; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .form-box { background: #e0fbfc; padding: 20px; border-radius: 10px; display: flex; gap: 10px; margin-bottom: 20px; align-items: center; flex-wrap: wrap;}
        .form-box input, .form-box select { padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; flex: 1; min-width: 120px;}
        .btn-action { background: var(--esmate-green); color: white; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: var(--esmate-blue); color: white; }
        tr:hover { background-color: #f1f1f1; }
        
        .btn-delete { background: var(--esmate-red); color: white; border: none; padding: 6px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .btn-edit { background: var(--esmate-orange); color: white; border: none; padding: 6px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; margin-right: 5px;}
        
        .badge-assign { background: #fee440; color: #333; padding: 3px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; margin-right: 5px; border: 1px solid #ccb100;}
        
        /* Estilos para Sub-rendimiento */
        .sub-nav { display: flex; gap: 5px; margin-bottom: 15px; background: #f1f3f5; padding: 10px; border-radius: 8px; }
        .sub-btn { background: white; border: 1px solid #ccc; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 13px; font-weight: bold; color: #666; }
        .sub-btn.active { background: var(--esmate-orange); color: white; border-color: var(--esmate-orange); }
    </style>
</head>
<body>

    <div id="login-screen" style="text-align:center; margin-top: 100px;">
        <h2>Acceso para Docentes</h2>
        <input type="password" id="pin-input" placeholder="PIN de Seguridad" style="padding: 10px; font-size: 16px;">
        <button onclick="verificarPIN()" style="padding: 10px 20px; font-size: 16px; background: #4361ee; color: white; border: none; cursor: pointer; border-radius: 5px;">Entrar</button>
    </div>

    <div id="dashboard" class="container" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Administración Virtual</h1>
            <button class="btn-action" style="background: #6c757d;" onclick="cargarTodo()">🔄 Sincronizar Datos</button>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="cambiarPestana('estudiantes')">👥 Estudiantes</button>
            <button class="tab-btn" onclick="cambiarPestana('asignar')">🎯 Asignar</button>
            <button class="tab-btn" onclick="cambiarPestana('practicas')">📊 Rendimiento</button>
        </div>

        <div id="tab-estudiantes" class="tab-content active">
            <div class="form-box">
                <input type="number" id="new-nie" placeholder="NIE">
                <input type="text" id="new-nombre" placeholder="Nombre Completo">
                <select id="new-grado">
                    <option value="2">2º Grado</option><option value="3">3º Grado</option>
                    <option value="4">4º Grado</option><option value="5">5º Grado</option><option value="6">6º Grado</option>
                </select>
                <button class="btn-action" onclick="guardarEstudiante()">➕ Registrar</button>
            </div>
            <div class="form-box" style="background: #f1f3f5; border: 1px solid #ddd;">
                <span>🔍 Filtrar por grado:</span>
                <select id="filtro-est-grado" onchange="filtrarEstudiantes()">
                    <option value="">🏫 Todos los Grados</option>
                    <option value="2">2º Grado</option><option value="3">3º Grado</option>
                    <option value="4">4º Grado</option><option value="5">5º Grado</option><option value="6">6º Grado</option>
                </select>
            </div>
            <table id="tabla-estudiantes">
                <thead><tr><th>NIE</th><th>Nombre</th><th>Grado</th><th>Acciones</th></tr></thead>
                <tbody id="est-body"></tbody>
            </table>
        </div>

        <div id="tab-asignar" class="tab-content">
            <h3 style="color: var(--esmate-blue);">👤 Individual</h3>
            <div class="form-box" style="background: #fff3cd;">
                <select id="assign-student"><option value="">Seleccionar estudiante...</option></select>
                <select id="assign-materia">
                    <option value="Matemática">Matemática</option><option value="Lenguaje">Lenguaje</option>
                    <option value="Ciencias">Ciencias</option><option value="Ciudadanía">Ciudadanía y Valores</option>
                </select>
                <select id="assign-unidad">
                    <option value="1">Unidad 1</option><option value="2">Unidad 2</option><option value="3">Unidad 3</option>
                </select>
                <select id="assign-tema" class="select-temas-dinamicos"></select>
                <button class="btn-action" style="background: var(--esmate-blue);" onclick="crearAsignacion()">🎯 Asignar</button>
            </div>

            <h3 style="color: var(--esmate-green);">🏫 Masiva por Grado</h3>
            <div class="form-box" style="background: #e6f7f5;">
                <select id="masivo-grado">
                    <option value="">Seleccionar grado...</option>
                    <option value="2">2º Grado</option><option value="3">3º Grado</option>
                    <option value="4">4º Grado</option><option value="5">5º Grado</option>
                </select>
                <select id="masivo-materia">
                    <option value="Matemática">Matemática</option><option value="Lenguaje">Lenguaje</option>
                    <option value="Ciencias">Ciencias</option>
                </select>
                <select id="masivo-unidad">
                    <option value="1">Unidad 1</option><option value="2">Unidad 2</option>
                </select>
                <select id="masivo-tema" class="select-temas-dinamicos"></select>
                <button class="btn-action" style="background: var(--esmate-green);" onclick="crearAsignacionMasiva()">🚀 Asignar a Todos</button>
            </div>

            <table>
                <thead><tr><th>Estudiante</th><th>Contenido</th><th>Acción</th></tr></thead>
                <tbody id="assign-body"></tbody>
            </table>
        </div>

        <div id="tab-practicas" class="tab-content">
            <div class="sub-nav">
                <button class="sub-btn active" onclick="cambiarVistaRendimiento('individual', this)">👤 Por Estudiante</button>
                <button class="sub-btn" onclick="cambiarVistaRendimiento('grado', this)">🏫 Por Grado</button>
                <button class="sub-btn" onclick="cambiarVistaRendimiento('asignatura', this)">📚 Por Asignatura</button>
                <button class="sub-btn" onclick="cambiarVistaRendimiento('tema', this)">📐 Por Tema</button>
            </div>

            <div id="rendimiento-controles" class="form-box">
                </div>

            <table id="tabla-rendimiento">
                <thead id="rend-head"></thead>
                <tbody id="rend-body"></tbody>
            </table>
        </div>

    </div>

    <script>
        const URL_BASE = "https://esmate-2026-default-rtdb.firebaseio.com/";
        let listaEstudiantes = [], listaPracticas = [], listaAsignaciones = [], nombresTemas = {};

        function verificarPIN() {
            if(document.getElementById('pin-input').value === "profe2026") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                cargarTodo();
            } else { alert("PIN Incorrecto"); }
        }

        function cambiarPestana(p) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + p).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        async function cargarTodo() { 
            await cargarNombresTemas(); 
            cargarEstudiantes(); 
            cargarPracticas(); 
            cargarAsignaciones(); 
        }

        // --- RETO: SINCRONIZACIÓN DE NOMBRES ---
        async function cargarNombresTemas() {
            try {
                const res = await fetch(URL_BASE + "config/temas.json");
                nombresTemas = await res.json() || {};
                dibujarSelectTemas();
            } catch (e) { console.log("Usando nombres por defecto"); dibujarSelectTemas(); }
        }

        function dibujarSelectTemas() {
            let html = "";
            for(let i=1; i<=20; i++) {
                // Si existe un nombre en la DB lo pone, si no pone "Tema X"
                let nombre = nombresTemas[i] || `Tema ${i}`;
                html += `<option value="${i}">${nombre}</option>`;
            }
            document.querySelectorAll('.select-temas-dinamicos').forEach(sel => sel.innerHTML = html);
        }

        // --- ESTUDIANTES ---
        function cargarEstudiantes() {
            fetch(URL_BASE + "estudiantes.json").then(res => res.json()).then(datos => {
                listaEstudiantes = datos ? Object.keys(datos).map(k => ({nie:k, ...datos[k]})) : [];
                filtrarEstudiantes();
                let selectHtml = '<option value="">Seleccionar estudiante...</option>';
                listaEstudiantes.sort((a,b)=>a.nombre.localeCompare(b.nombre)).forEach(e => {
                    selectHtml += `<option value="${e.nie}">${e.nombre} (${e.grado}º)</option>`;
                });
                document.getElementById('assign-student').innerHTML = selectHtml;
            });
        }
        function filtrarEstudiantes() {
            let g = document.getElementById('filtro-est-grado').value;
            let f = g ? listaEstudiantes.filter(e => e.grado === g) : listaEstudiantes;
            let html = "";
            f.sort((a,b)=>a.nombre.localeCompare(b.nombre)).forEach(e => {
                html += `<tr><td>${e.nie}</td><td>${e.nombre}</td><td>${e.grado}º</td>
                <td><button class="btn-edit" onclick="prepararEdit('${e.nie}','${e.nombre}','${e.grado}')">✏️</button>
                <button class="btn-delete" onclick="borrarEst('${e.nie}')">🗑️</button></td></tr>`;
            });
            document.getElementById('est-body').innerHTML = html;
        }

        function guardarEstudiante() {
            let nie = document.getElementById('new-nie').value, nom = document.getElementById('new-nombre').value, gra = document.getElementById('new-grado').value;
            if(!nie || !nom) return alert("Faltan datos");
            fetch(URL_BASE + `estudiantes/${nie}.json`, { method:"PUT", body:JSON.stringify({nombre:nom, grado:gra}) }).then(()=> {
                document.getElementById('new-nie').value=""; document.getElementById('new-nombre').value=""; cargarEstudiantes();
            });
        }
        function borrarEst(nie) { if(confirm("¿Borrar?")) fetch(URL_BASE + `estudiantes/${nie}.json`, {method:"DELETE"}).then(()=>cargarEstudiantes()); }

        // --- ASIGNACIONES ---
        function cargarAsignaciones() {
            fetch(URL_BASE + "asignaciones.json").then(res => res.json()).then(datos => {
                listaAsignaciones = [];
                if(datos) for(let nie in datos) for(let id in datos[nie]) listaAsignaciones.push({id, nie, ...datos[nie][id]});
                let h = "";
                listaAsignaciones.forEach(a => {
                    let e = listaEstudiantes.find(est => est.nie == a.nie);
                    let tNom = nombresTemas[a.tema] || `Tema ${a.tema}`;
                    h += `<tr><td><b>${e ? e.nombre : a.nie}</b></td><td><span class="badge-assign">${a.materia}</span> U${a.unidad} - ${tNom}</td>
                    <td><button class="btn-delete" onclick="borrarAsignacion('${a.nie}','${a.id}')">Eliminar</button></td></tr>`;
                });
                document.getElementById('assign-body').innerHTML = h;
            });
        }
        function crearAsignacion() {
            let nie = document.getElementById('assign-student').value;
            if(!nie) return alert("Elige estudiante");
            let data = { materia: document.getElementById('assign-materia').value, unidad: document.getElementById('assign-unidad').value, tema: document.getElementById('assign-tema').value, fecha: new Date().toLocaleString() };
            fetch(URL_BASE + `asignaciones/${nie}.json`, { method: "POST", body: JSON.stringify(data) }).then(() => cargarAsignaciones());
        }
        function crearAsignacionMasiva() {
            let g = document.getElementById('masivo-grado').value;
            if(!g) return alert("Elige grado");
            let ests = listaEstudiantes.filter(e => e.grado === g);
            let data = { materia: document.getElementById('masivo-materia').value, unidad: document.getElementById('masivo-unidad').value, tema: document.getElementById('masivo-tema').value, fecha: new Date().toLocaleString() };
            let ps = ests.map(e => fetch(URL_BASE + `asignaciones/${e.nie}.json`, { method: "POST", body: JSON.stringify(data) }));
            Promise.all(ps).then(() => { alert("Asignado a todo el grado"); cargarAsignaciones(); });
        }
        function borrarAsignacion(nie, id) { fetch(URL_BASE + `asignaciones/${nie}/${id}.json`, { method: "DELETE" }).then(() => cargarAsignaciones()); }

        // --- OPCIÓN B: RENDIMIENTO DETALLADO ---
        let vistaActualRendimiento = "individual";
        function cambiarVistaRendimiento(v, btn) {
            vistaActualRendimiento = v;
            document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            dibujarControlesRendimiento();
        }

        function dibujarControlesRendimiento() {
            let c = document.getElementById('rendimiento-controles');
            if(vistaActualRendimiento === "individual") {
                c.innerHTML = `<select id="rend-sel-est" onchange="verRendimiento()"><option value="">Selecciona un estudiante...</option>${listaEstudiantes.map(e=>`<option value="${e.nombre}">${e.nombre}</option>`)}</select>`;
            } else if(vistaActualRendimiento === "grado") {
                c.innerHTML = `<select id="rend-sel-grado" onchange="verRendimiento()"><option value="">Selecciona un grado...</option><option value="2">2º Grado</option><option value="3">3º Grado</option><option value="4">4º Grado</option><option value="5">5º Grado</option></select>`;
            } else if(vistaActualRendimiento === "tema") {
                c.innerHTML = `<select id="rend-sel-tema" onchange="verRendimiento()"><option value="">Selecciona un tema...</option>${[...new Set(listaPracticas.map(p=>p.tema))].map(t=>`<option value="${t}">${t}</option>`)}</select>`;
            } else { c.innerHTML = "<span>Mostrando promedios generales por materia</span>"; verRendimiento(); }
        }

        function cargarPracticas() {
            fetch(URL_BASE + "practicas.json").then(res => res.json()).then(datos => {
                listaPracticas = datos ? Object.keys(datos).map(k => ({id:k, ...datos[k]})) : [];
                listaPracticas.reverse();
                dibujarControlesRendimiento();
            });
        }

        function verRendimiento() {
            let body = document.getElementById('rend-body'), head = document.getElementById('rend-head'), html = "";
            
            if(vistaActualRendimiento === "individual") {
                head.innerHTML = "<tr><th>Fecha</th><th>Tema</th><th>Puntos</th><th>Fallos</th></tr>";
                let nom = document.getElementById('rend-sel-est').value;
                listaPracticas.filter(p => p.nombre === nom).forEach(p => html += `<tr><td>${p.fecha}</td><td>${p.tema}</td><td>${p.aciertos}</td><td>${p.fallos}</td></tr>`);
            } else if(vistaActualRendimiento === "grado") {
                head.innerHTML = "<tr><th>Estudiante</th><th>Promedio Puntos</th><th>Prácticas Realizadas</th></tr>";
                let g = document.getElementById('rend-sel-grado').value;
                let porEst = {};
                listaPracticas.filter(p => p.grado == g).forEach(p => {
                    if(!porEst[p.nombre]) porEst[p.nombre] = { suma:0, cant:0 };
                    porEst[p.nombre].suma += parseInt(p.aciertos); porEst[p.nombre].cant++;
                });
                for(let n in porEst) html += `<tr><td>${n}</td><td>${(porEst[n].suma/porEst[n].cant).toFixed(1)}</td><td>${porEst[n].cant}</td></tr>`;
            } else if(vistaActualRendimiento === "tema") {
                head.innerHTML = "<tr><th>Estudiante</th><th>Nota</th><th>Estado</th></tr>";
                let t = document.getElementById('rend-sel-tema').value;
                listaPracticas.filter(p => p.tema === t).forEach(p => {
                    let estado = p.aciertos >= 8 ? "✅ Aprobado" : "❌ Refuerzo";
                    html += `<tr><td>${p.nombre}</td><td>${p.aciertos}</td><td>${estado}</td></tr>`;
                });
            }
            body.innerHTML = html || "<tr><td colspan='4' style='text-align:center;'>No hay datos para mostrar.</td></tr>";
        }
    </script>
</body>
</html>
