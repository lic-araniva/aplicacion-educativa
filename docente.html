<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Docente - ESMATE</title>
    <style>
        :root {
            --esmate-blue: #4361ee; --bg-color: #f4f7f6; --text-dark: #2b2d42;
            --correct-color: #2d6a4f; --incorrect-color: #d90429; --card-bg: #ffffff;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-dark); margin: 0; padding: 0; display: flex; justify-content: center; min-height: 100vh; }
        
        /* LOGIN */
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100vh; }
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        .login-card input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; text-align: center; }
        
        button { cursor: pointer; transition: 0.2s; font-family: inherit; }
        button.primary { background-color: var(--esmate-blue); color: white; border: none; padding: 12px 24px; font-weight: bold; font-size: 16px; border-radius: 8px; width: 100%; }
        button.primary:hover { background-color: #3f37c9; }
        button.secondary { background-color: #2a9d8f; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; }
        button.action-btn { border: none; padding: 6px 12px; border-radius: 5px; font-weight: bold; color: white; font-size: 13px; margin: 2px; }

        /* DASHBOARD PRINCIPAL */
        #dashboard-screen { display: none; width: 100%; max-width: 1000px; padding: 20px; flex-direction: column; }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ddd; padding-bottom: 10px; margin-bottom: 20px; }
        .header h1 { color: var(--esmate-blue); margin: 0; }
        
        /* MENÚ DE PESTAÑAS */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px 8px 0 0; background: #e9ecef; color: #555; cursor: pointer; }
        .tab-btn.active { background: var(--esmate-blue); color: white; }
        
        /* SECCIONES */
        .section { display: none; background: white; padding: 20px; border-radius: 0 8px 8px 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .section.active { display: block; }

        /* TABLAS Y GRIDS */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .stat-card { background: var(--bg-color); padding: 20px; border-radius: 10px; text-align: center; border-top: 4px solid var(--esmate-blue); }
        .stat-card .number { font-size: 32px; font-weight: bold; color: var(--text-dark); margin-top: 10px; }
        
        .controls, .form-row { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; align-items: center; }
        .controls input, .controls select, .form-row input, .form-row select { padding: 10px; border: 1px solid #ccc; border-radius: 8px; flex-grow: 1; }

        table { width: 100%; border-collapse: collapse; text-align: left; margin-top: 10px; font-size: 14px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; }
        th { background-color: var(--esmate-blue); color: white; }
        tr:hover { background-color: #f1f3f5; }
        
        .status-good { color: var(--correct-color); font-weight: bold; background: #d8f3dc; padding: 4px 8px; border-radius: 12px; font-size: 12px; }
        .status-bad { color: var(--incorrect-color); font-weight: bold; background: #ffccd5; padding: 4px 8px; border-radius: 12px; font-size: 12px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1 style="color: var(--esmate-blue); margin-top:0;">🔒 Acceso Docente</h1>
            <input type="password" id="pin-input" placeholder="Escribe el PIN (profe2026)">
            <button class="primary" onclick="verificarPIN()">Entrar al Panel</button>
            <p id="login-error" style="color: red; display: none; margin-top: 15px;">PIN incorrecto.</p>
        </div>
    </div>

    <div id="dashboard-screen">
        <div class="header">
            <h1>👨‍🏫 Panel Docente ESMATE</h1>
            <button class="primary" style="width: auto; background: #dc3545;" onclick="location.reload()">Salir</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="btn-tab-notas" onclick="cambiarPestana('notas')">📊 Calificaciones</button>
            <button class="tab-btn" id="btn-tab-alumnos" onclick="cambiarPestana('alumnos')">🧑‍🎓 Gestión de Alumnos</button>
        </div>

        <div id="sec-notas" class="section active">
            <div class="stats-grid">
                <div class="stat-card"><h3>Prácticas Registradas</h3><div class="number" id="stat-total">0</div></div>
                <div class="stat-card"><h3>Promedio de Aciertos</h3><div class="number" id="stat-promedio" style="color: var(--correct-color)">0%</div></div>
            </div>
            <div class="controls">
                <input type="text" id="search-name" placeholder="🔍 Buscar alumno..." onkeyup="filtrarTablaNotas()">
                <select id="filter-grade" onchange="filtrarTablaNotas()">
                    <option value="Todos">Todos los Grados</option><option value="2">2º Grado</option><option value="3">3º Grado</option>
                    <option value="4">4º Grado</option><option value="5">5º Grado</option><option value="6">6º Grado</option>
                </select>
                <button class="secondary" onclick="descargarExcel()">📥 Exportar a Excel</button>
            </div>
            <div style="overflow-x: auto;">
                <table id="results-table">
                    <thead><tr><th>Fecha</th><th>Estudiante</th><th>Grado</th><th>Tema</th><th>Aciertos</th><th>Fallos</th><th>Estado</th></tr></thead>
                    <tbody id="table-body"><tr><td colspan="7" style="text-align: center;">Cargando...</td></tr></tbody>
                </table>
            </div>
        </div>

        <div id="sec-alumnos" class="section">
            <h2 style="margin-top: 0; color: var(--text-dark);">Añadir / Editar Estudiante</h2>
            <div style="background: var(--bg-color); padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd;">
                <div class="form-row">
                    <input type="number" id="nuevo-nie" placeholder="NIE del Estudiante" autocomplete="off">
                    <input type="text" id="nuevo-nombre" placeholder="Nombre Completo" autocomplete="off">
                    <select id="nuevo-grado">
                        <option value="">Selecciona Grado...</option>
                        <option value="2">2º Grado</option><option value="3">3º Grado</option>
                        <option value="4">4º Grado</option><option value="5">5º Grado</option>
                        <option value="6">6º Grado</option>
                    </select>
                    <button class="primary" style="width: auto;" onclick="guardarEstudiante()">💾 Guardar Alumno</button>
                </div>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 10px;">
                <h2 style="color: var(--text-dark); margin: 0;">Lista Oficial</h2>
                <div class="controls" style="margin-bottom: 0;">
                    <input type="text" id="search-estudiante" placeholder="🔍 Buscar por nombre..." onkeyup="filtrarTablaEstudiantes()">
                    <select id="filter-estudiante-grado" onchange="filtrarTablaEstudiantes()">
                        <option value="Todos">Ver Todos los Grados</option>
                        <option value="2">2º Grado</option><option value="3">3º Grado</option>
                        <option value="4">4º Grado</option><option value="5">5º Grado</option><option value="6">6º Grado</option>
                    </select>
                </div>
            </div>

            <div style="overflow-x: auto;">
                <table>
                    <thead><tr><th>NIE</th><th>Nombre Completo</th><th>Grado</th><th>Acciones</th></tr></thead>
                    <tbody id="alumnos-body"><tr><td colspan="4" style="text-align: center;">Cargando estudiantes...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const PIN_SECRETO = "profe2026";
        const URL_BASE = "https://esmate-2026-default-rtdb.firebaseio.com/";
        
        let datosNotasGlobales = []; 
        let datosEstudiantesGlobales = []; // Nuevo arreglo para guardar los estudiantes y poder filtrarlos

        function verificarPIN() {
            if (document.getElementById('pin-input').value === PIN_SECRETO) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard-screen').style.display = 'flex';
                cargarDatosDeFirebase(); 
                cargarEstudiantes(); 
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }
        document.getElementById('pin-input').addEventListener("keypress", e => { if (e.key === "Enter") verificarPIN(); });

        function cambiarPestana(pestana) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
            document.getElementById('btn-tab-' + pestana).classList.add('active');
            document.getElementById('sec-' + pestana).classList.add('active');
        }

        // ==========================================
        // LÓGICA DE ALUMNOS (Edición, Borrado y Filtrado)
        // ==========================================
        function guardarEstudiante() {
            const nie = document.getElementById('nuevo-nie').value.trim();
            const nombre = document.getElementById('nuevo-nombre').value.trim();
            const grado = document.getElementById('nuevo-grado').value;

            if(!nie || !nombre || !grado) {
                alert("Por favor, llena todos los campos (NIE, Nombre y Grado)."); return;
            }

            const url = URL_BASE + `estudiantes/${nie}.json`;
            const datosAlumno = { nombre: nombre, grado: grado };

            fetch(url, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(datosAlumno) })
            .then(res => res.json())
            .then(() => {
                alert("✅ Estudiante guardado/actualizado correctamente.");
                document.getElementById('nuevo-nie').value = "";
                document.getElementById('nuevo-nombre').value = "";
                document.getElementById('nuevo-grado').value = "";
                cargarEstudiantes(); 
            })
            .catch(error => alert("Error al guardar: " + error.message));
        }

        function cargarEstudiantes() {
            fetch(URL_BASE + "estudiantes.json")
            .then(res => res.json())
            .then(datos => {
                datosEstudiantesGlobales = []; // Limpiamos el arreglo
                if (datos) {
                    for (let nie in datos) {
                        let alumno = datos[nie];
                        alumno.nie = nie; // Le agregamos el NIE al objeto para no perderlo
                        datosEstudiantesGlobales.push(alumno);
                    }
                }
                filtrarTablaEstudiantes(); // Llamamos al filtro que se encarga de dibujar la tabla
            });
        }

        function renderizarTablaEstudiantes(lista) {
            const tbody = document.getElementById('alumnos-body');
            tbody.innerHTML = '';
            
            if (lista.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center;">No se encontraron estudiantes con ese filtro.</td></tr>';
                return;
            }

            lista.forEach(alumno => {
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${alumno.nie}</strong></td>
                        <td>${alumno.nombre}</td>
                        <td>${alumno.grado}º Grado</td>
                        <td>
                            <button class="action-btn" style="background: #f4a261;" onclick="prepararEdicion('${alumno.nie}', '${alumno.nombre}', '${alumno.grado}')">✏️ Editar</button>
                            <button class="action-btn" style="background: #d90429;" onclick="eliminarEstudiante('${alumno.nie}')">🗑️ Borrar</button>
                        </td>
                    </tr>
                `;
            });
        }

        function filtrarTablaEstudiantes() {
            const txt = document.getElementById('search-estudiante').value.toLowerCase();
            const gr = document.getElementById('filter-estudiante-grado').value;

            const filtrados = datosEstudiantesGlobales.filter(alumno => {
                const coincideNombre = alumno.nombre.toLowerCase().includes(txt);
                const coincideGrado = (gr === "Todos" || alumno.grado == gr);
                return coincideNombre && coincideGrado;
            });

            renderizarTablaEstudiantes(filtrados);
        }

        function prepararEdicion(nie, nombre, grado) {
            document.getElementById('nuevo-nie').value = nie;
            document.getElementById('nuevo-nombre').value = nombre;
            document.getElementById('nuevo-grado').value = grado;
            window.scrollTo(0, 0); 
            alert("Los datos se cargaron arriba. Modifícalos y presiona 'Guardar Alumno'.");
        }

        function eliminarEstudiante(nie) {
            if(confirm(`¿Estás súper seguro de eliminar el NIE ${nie}? Esta acción no se puede deshacer.`)) {
                fetch(URL_BASE + `estudiantes/${nie}.json`, { method: "DELETE" })
                .then(res => res.json())
                .then(() => {
                    alert("🗑️ Estudiante eliminado de la base de datos.");
                    cargarEstudiantes();
                })
                .catch(error => alert("Error al borrar: " + error.message));
            }
        }

        // ==========================================
        // LÓGICA DE CALIFICACIONES Y EXCEL
        // ==========================================
        function cargarDatosDeFirebase() {
            fetch(URL_BASE + "practicas.json")
            .then(res => res.json())
            .then(datos => {
                datosNotasGlobales = [];
                for (let id in datos) datosNotasGlobales.push(datos[id]);
                datosNotasGlobales.reverse();
                actualizarTarjetas(); renderizarTablaNotas(datosNotasGlobales);
            });
        }

        function actualizarTarjetas() {
            document.getElementById('stat-total').textContent = datosNotasGlobales.length;
            if(datosNotasGlobales.length === 0) return;
            let sumaA = 0, sumaT = 0;
            datosNotasGlobales.forEach(p => { sumaA += (parseInt(p.aciertos)||0); sumaT += ((parseInt(p.aciertos)||0) + (parseInt(p.fallos)||0)); });
            document.getElementById('stat-promedio').textContent = Math.round((sumaA/sumaT)*100) + "%";
        }

        function renderizarTablaNotas(datos) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            if (datos.length === 0) return tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">Sin resultados</td></tr>';
            
            datos.forEach(p => {
                let estado = p.aciertos >= 6 ? '<span class="status-good">✔️ Aprobado</span>' : '<span class="status-bad">⚠️ Refuerzo</span>';
                tbody.innerHTML += `<tr><td>${p.fecha||""}</td><td><strong>${p.nombre||""}</strong></td><td>${p.grado}º</td><td>${p.tema||""}</td><td style="color:green;font-weight:bold">${p.aciertos}</td><td style="color:red;font-weight:bold">${p.fallos}</td><td>${estado}</td></tr>`;
            });
        }

        function filtrarTablaNotas() {
            const txt = document.getElementById('search-name').value.toLowerCase();
            const gr = document.getElementById('filter-grade').value;
            renderizarTablaNotas(datosNotasGlobales.filter(p => (p.nombre||"").toLowerCase().includes(txt) && (gr === "Todos" || p.grado == gr)));
        }

        function descargarExcel() {
            if (datosNotasGlobales.length === 0) { alert("No hay datos para exportar."); return; }
            let csvContent = "Fecha,Estudiante,Grado,Tema,Aciertos,Fallos\n";
            
            const txt = document.getElementById('search-name').value.toLowerCase();
            const gr = document.getElementById('filter-grade').value;
            const datosAExportar = datosNotasGlobales.filter(p => {
                const coincideNombre = (p.nombre || "").toLowerCase().includes(txt);
                const coincideGrado = (gr === "Todos" || p.grado == gr);
                return coincideNombre && coincideGrado;
            });

            datosAExportar.forEach(row => {
                let nombreLimpio = (row.nombre || "Anónimo").replace(/,/g, "");
                let temaLimpio = (row.tema || "Tema General").replace(/,/g, "");
                csvContent += `${row.fecha},${nombreLimpio},${row.grado},${temaLimpio},${row.aciertos},${row.fallos}\n`;
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", "Registro_ESMATE.csv");
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
