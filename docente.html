<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Docente - ESMATE</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f8f9fa; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #4361ee; text-align: center; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #e0fbfc; padding: 20px; border-radius: 10px; text-align: center; border-left: 5px solid #4361ee; }
        .stat-card h2 { margin: 0; font-size: 36px; color: #4361ee; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #4361ee; color: white; position: sticky; top: 0; }
        tr:hover { background-color: #f1f1f1; }
        .badge-perfect { background-color: #2d6a4f; color: white; padding: 4px 8px; border-radius: 12px; font-weight: bold; font-size: 12px; }
        .badge-good { background-color: #f4a261; color: white; padding: 4px 8px; border-radius: 12px; font-weight: bold; font-size: 12px; }
        .btn-delete { background: #d90429; color: white; border: none; padding: 6px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold;}
        .btn-delete:hover { background: #9d0208; }
        .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .filter-bar input, .filter-bar select { padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 14px; }
    </style>
</head>
<body>

    <div id="login-screen" style="text-align:center; margin-top: 100px;">
        <h2>Acceso para Docentes</h2>
        <input type="password" id="pin-input" placeholder="PIN de Seguridad" style="padding: 10px; font-size: 16px;">
        <button onclick="verificarPIN()" style="padding: 10px 20px; font-size: 16px; background: #4361ee; color: white; border: none; cursor: pointer;">Entrar</button>
    </div>

    <div id="dashboard" class="container" style="display: none;">
        <h1>📊 Rendimiento de Estudiantes</h1>
        
        <div class="stats-grid">
            <div class="stat-card"><h3>Total Prácticas</h3><h2 id="total-practicas">0</h2></div>
            <div class="stat-card"><h3>Notas Perfectas (10)</h3><h2 id="total-perfectas">0</h2></div>
            <div class="stat-card"><h3>Total Estudiantes</h3><h2 id="total-alumnos">0</h2></div>
        </div>

        <div class="filter-bar">
            <input type="text" id="filtro-nombre" placeholder="🔍 Buscar estudiante..." onkeyup="filtrarTabla()" style="flex: 1;">
            <select id="filtro-tema" onchange="filtrarTabla()" style="flex: 1;">
                <option value="">📚 Todos los temas</option>
                <option value="U1">Unidad 1 (Conozcamos los números)</option>
                <option value="U2">Unidad 2 (Suma)</option>
            </select>
            <button onclick="cargarDatos()" style="background: #2a9d8f; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer;">🔄 Actualizar</button>
        </div>

        <table>
            <thead><tr><th>Fecha y Hora</th><th>Nombre</th><th>Grado</th><th>Tema / Nivel</th><th>Aciertos</th><th>Fallos</th><th>Acción</th></tr></thead>
            <tbody id="tabla-body"><tr><td colspan="7" style="text-align: center;">Cargando datos...</td></tr></tbody>
        </table>
    </div>

    <script>
        const URL_BASE = "https://esmate-2026-default-rtdb.firebaseio.com/";
        let datosGlobales = [];

        function verificarPIN() {
            if(document.getElementById('pin-input').value === "profe2026") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                cargarDatos();
            } else { alert("PIN Incorrecto."); }
        }

        function cargarDatos() {
            fetch(URL_BASE + "practicas.json").then(res => res.json()).then(datos => {
                if(!datos) { document.getElementById('tabla-body').innerHTML = "<tr><td colspan='7'>No hay datos.</td></tr>"; return; }
                
                // Convertir el objeto de Firebase en un Array con su ID para poder borrar
                datosGlobales = Object.keys(datos).map(key => ({ id: key, ...datos[key] }));
                datosGlobales.reverse(); // Los más recientes primero
                
                actualizarEstadisticas();
                dibujarTabla(datosGlobales);
            });
        }

        function actualizarEstadisticas() {
            document.getElementById('total-practicas').textContent = datosGlobales.length;
            document.getElementById('total-perfectas').textContent = datosGlobales.filter(p => parseInt(p.aciertos) === 10).length;
            let alumnosUnicos = new Set(datosGlobales.map(p => p.nombre));
            document.getElementById('total-alumnos').textContent = alumnosUnicos.size;
        }

        function dibujarTabla(lista) {
            let html = "";
            lista.forEach(p => {
                let badge = "";
                let notaStr = `${p.aciertos}`;
                // Detectar si era de 20 preguntas (Nivel 9)
                if(p.tema.includes("Nivel 9")) {
                    if(parseInt(p.aciertos) === 10) badge = "<span class='badge-perfect'>PERFECTO 🌟</span>";
                } else {
                    if(parseInt(p.aciertos) === 10) badge = "<span class='badge-perfect'>PERFECTO 🌟</span>";
                    else if(parseInt(p.aciertos) >= 8) badge = "<span class='badge-good'>BUENO 👍</span>";
                }

                html += `<tr>
                    <td style="font-size: 12px; color: #555;">${p.fecha || "-"}</td>
                    <td style="font-weight: bold;">${p.nombre}</td>
                    <td>${p.grado}º</td>
                    <td>${p.tema}</td>
                    <td style="font-weight: bold; color: #2d6a4f;">${notaStr}</td>
                    <td style="color: #d90429;">${p.fallos}</td>
                    <td><button class="btn-delete" onclick="borrarRegistro('${p.id}')">🗑️ Borrar</button></td>
                </tr>`;
            });
            document.getElementById('tabla-body').innerHTML = html;
        }

        function filtrarTabla() {
            let txt = document.getElementById('filtro-nombre').value.toLowerCase();
            let tema = document.getElementById('filtro-tema').value;
            
            let filtrados = datosGlobales.filter(p => {
                let matchNombre = p.nombre.toLowerCase().includes(txt);
                let matchTema = tema === "" || p.tema.includes(tema) || p.tema.includes("Unidad " + tema.replace("U",""));
                return matchNombre && matchTema;
            });
            dibujarTabla(filtrados);
        }

        // FUNCIÓN PARA BORRAR REGISTROS DE PRUEBA
        function borrarRegistro(idRegistro) {
            if(confirm("¿Estás seguro de que deseas borrar esta práctica? (Esta acción no se puede deshacer)")) {
                fetch(URL_BASE + "practicas/" + idRegistro + ".json", {
                    method: "DELETE"
                }).then(() => {
                    cargarDatos(); // Recargar la tabla
                });
            }
        }
    </script>
</body>
</html>
