<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Docente - Administrador</title>
    <style>
        :root { --esmate-blue: #4361ee; --esmate-green: #2a9d8f; --esmate-red: #d90429; --esmate-orange: #f4a261; --bg-color: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: var(--esmate-blue); text-align: center; margin-top: 0;}
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #ccc; padding-bottom: 10px; flex-wrap: wrap; }
        .tab-btn { background: #e9ecef; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; color: #555; transition: 0.3s; }
        .tab-btn.active { background: var(--esmate-blue); color: white; }
        .tab-content { display: none; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .form-box { background: #e0fbfc; padding: 20px; border-radius: 10px; display: flex; gap: 10px; margin-bottom: 20px; align-items: center; flex-wrap: wrap;}
        .form-box input, .form-box select { padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; flex: 1; min-width: 120px;}
        .btn-action { background: var(--esmate-green); color: white; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: var(--esmate-blue); color: white; }
        tr:hover { background-color: #f1f1f1; }
        
        .btn-delete { background: var(--esmate-red); color: white; border: none; padding: 6px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .btn-edit { background: var(--esmate-orange); color: white; border: none; padding: 6px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; margin-right: 5px;}
        .btn-assign { background: var(--esmate-blue); color: white; border: none; padding: 6px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold;}

        .badge-assign { background: #fee440; color: #333; padding: 3px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; margin-right: 5px; border: 1px solid #ccb100;}
    </style>
</head>
<body>

    <div id="login-screen" style="text-align:center; margin-top: 100px;">
        <h2>Acceso para Docentes</h2>
        <input type="password" id="pin-input" placeholder="PIN de Seguridad" style="padding: 10px; font-size: 16px;">
        <button onclick="verificarPIN()" style="padding: 10px 20px; font-size: 16px; background: #4361ee; color: white; border: none; cursor: pointer; border-radius: 5px;">Entrar</button>
    </div>

    <div id="dashboard" class="container" style="display: none;">
        <h1>Administración de Escuela Virtual</h1>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="cambiarPestana('estudiantes')">👥 Estudiantes</button>
            <button class="tab-btn" onclick="cambiarPestana('asignar')">🎯 Asignar Contenido</button>
            <button class="tab-btn" onclick="cambiarPestana('practicas')">📊 Rendimiento</button>
        </div>

        <div id="tab-estudiantes" class="tab-content active">
            <h3 id="form-titulo">Registrar Estudiante</h3>
            <div class="form-box">
                <input type="number" id="new-nie" placeholder="NIE">
                <input type="text" id="new-nombre" placeholder="Nombre Completo">
                <select id="new-grado">
                    <option value="2">2º Grado</option><option value="3">3º Grado</option>
                    <option value="4">4º Grado</option><option value="5">5º Grado</option><option value="6">6º Grado</option>
                </select>
                <button class="btn-action" id="btn-guardar-est" onclick="guardarEstudiante()">➕ Registrar</button>
            </div>
            <table id="tabla-estudiantes">
                <thead><tr><th>NIE</th><th>Nombre</th><th>Grado</th><th>Acciones</th></tr></thead>
                <tbody id="est-body"></tbody>
            </table>
        </div>

        <div id="tab-asignar" class="tab-content">
            <h3>Asignar Unidad de Refuerzo o Nivelación</h3>
            <div class="form-box" style="background: #fff3cd; border: 2px solid #ffeeba;">
                <select id="assign-student">
                    <option value="">👤 Selecciona un estudiante...</option>
                </select>
                <select id="assign-grado">
                    <option value="2">De 2º Grado</option><option value="3">De 3º Grado</option>
                    <option value="4">De 4º Grado</option><option value="5">De 5º Grado</option>
                </select>
                <select id="assign-materia">
                    <option value="Matemática">Matemática</option><option value="Lenguaje">Lenguaje</option>
                    <option value="Ciencia">Ciencia</option>
                </select>
                <select id="assign-unidad">
                    <option value="1">Unidad 1</option>
                    <option value="2">Unidad 2</option>
                    <option value="3">Unidad 3</option>
                    <option value="4">Unidad 4</option>
                    <option value="5">Unidad 5</option>
                    <option value="6">Unidad 6</option>
                    <option value="7">Unidad 7</option>
                    <option value="8">Unidad 8</option>
                    <option value="9">Unidad 9</option>
                    <option value="10">Unidad 10</option>
                </select>
                <button class="btn-action" style="background: var(--esmate-blue);" onclick="crearAsignacion()">🎯 Asignar</button>
            </div>
            <h3>Tareas Asignadas Actuales</h3>
            <table>
                <thead><tr><th>Estudiante</th><th>Contenido Asignado</th><th>Acción</th></tr></thead>
                <tbody id="assign-body"></tbody>
            </table>
        </div>

        <div id="tab-practicas" class="tab-content">
            <div class="form-box">
                <input type="text" id="filtro-prac-nombre" placeholder="🔍 Buscar nombre..." onkeyup="filtrarPracticas()">
                <select id="filtro-tema" onchange="filtrarPracticas()"><option value="">📚 Todos los temas</option></select>
            </div>
            <table id="tabla-practicas">
                <thead><tr><th>Fecha</th><th>Nombre</th><th>Grado</th><th>Tema</th><th>Nota</th><th>Fallos</th><th>Acción</th></tr></thead>
                <tbody id="prac-body"></tbody>
            </table>
        </div>

    </div>

    <script>
        const URL_BASE = "https://esmate-2026-default-rtdb.firebaseio.com/";
        let listaEstudiantes = [], listaPracticas = [], listaAsignaciones = [];

        function verificarPIN() {
            if(document.getElementById('pin-input').value === "profe2026") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                cargarTodo();
            } else { alert("PIN Incorrecto"); }
        }

        function cambiarPestana(p) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + p).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function cargarTodo() { cargarEstudiantes(); cargarPracticas(); cargarAsignaciones(); }

        // --- LÓGICA ESTUDIANTES ---
        function cargarEstudiantes() {
            fetch(URL_BASE + "estudiantes.json").then(res => res.json()).then(datos => {
                listaEstudiantes = datos ? Object.keys(datos).map(k => ({nie:k, ...datos[k]})) : [];
                let html = "", selectHtml = '<option value="">👤 Selecciona un estudiante...</option>';
                listaEstudiantes.sort((a,b)=>a.nombre.localeCompare(b.nombre)).forEach(e => {
                    html += `<tr><td>${e.nie}</td><td>${e.nombre}</td><td>${e.grado}º</td>
                    <td><button class="btn-edit" onclick="prepararEdit('${e.nie}','${e.nombre}','${e.grado}')">✏️</button>
                    <button class="btn-delete" onclick="borrarEst('${e.nie}')">🗑️</button></td></tr>`;
                    selectHtml += `<option value="${e.nie}">${e.nombre} (${e.grado}º)</option>`;
                });
                document.getElementById('est-body').innerHTML = html;
                document.getElementById('assign-student').innerHTML = selectHtml;
            });
        }

        function guardarEstudiante() {
            let nie = document.getElementById('new-nie').value, nom = document.getElementById('new-nombre').value, gra = document.getElementById('new-grado').value;
            if(!nie || !nom) return alert("Completa los datos");
            fetch(URL_BASE + `estudiantes/${nie}.json`, { method:"PUT", body:JSON.stringify({nombre:nom, grado:gra}) }).then(()=> {
                document.getElementById('new-nie').value=""; document.getElementById('new-nombre').value=""; cargarEstudiantes();
            });
        }
        
        function borrarEst(nie) { if(confirm("¿Borrar estudiante?")) fetch(URL_BASE + `estudiantes/${nie}.json`, {method:"DELETE"}).then(()=>cargarEstudiantes()); }

        // --- LÓGICA MOTOR DE ASIGNACIONES (EL CORAZÓN NUEVO) ---
        function cargarAsignaciones() {
            fetch(URL_BASE + "asignaciones.json").then(res => res.json()).then(datos => {
                listaAsignaciones = [];
                if(datos) {
                    for(let nie in datos) {
                        for(let idAsig in datos[nie]) {
                            listaAsignaciones.push({ id: idAsig, nie: nie, ...datos[nie][idAsig] });
                        }
                    }
                }
                dibujarTablaAsignaciones();
            });
        }

        function dibujarTablaAsignaciones() {
            let html = "";
            listaAsignaciones.forEach(a => {
                let est = listaEstudiantes.find(e => e.nie == a.nie);
                let nombreEst = est ? est.nombre : "NIE: " + a.nie;
                html += `<tr>
                    <td><b>${nombreEst}</b></td>
                    <td><span class="badge-assign">${a.grado}º Grado</span> ${a.materia} - Unidad ${a.unidad}</td>
                    <td><button class="btn-delete" onclick="borrarAsignacion('${a.nie}', '${a.id}')">Eliminar</button></td>
                </tr>`;
            });
            document.getElementById('assign-body').innerHTML = html || "<tr><td colspan='3' style='text-align:center;'>No hay tareas asignadas.</td></tr>";
        }

        function crearAsignacion() {
            let nie = document.getElementById('assign-student').value;
            let grado = document.getElementById('assign-grado').value;
            let materia = document.getElementById('assign-materia').value;
            let unidad = document.getElementById('assign-unidad').value;

            if(!nie) return alert("Selecciona un estudiante");

            let nuevaAsig = { grado: grado, materia: materia, unidad: unidad, fecha: new Date().toLocaleString() };

            fetch(URL_BASE + `asignaciones/${nie}.json`, {
                method: "POST",
                body: JSON.stringify(nuevaAsig)
            }).then(() => {
                alert("🎯 Contenido asignado con éxito");
                cargarAsignaciones();
            });
        }

        function borrarAsignacion(nie, id) {
            if(confirm("¿Quitar esta asignación?")) {
                fetch(URL_BASE + `asignaciones/${nie}/${id}.json`, { method: "DELETE" }).then(() => cargarAsignaciones());
            }
        }

        // --- RENDIMIENTO ---
        function cargarPracticas() {
            fetch(URL_BASE + "practicas.json").then(res => res.json()).then(datos => {
                listaPracticas = datos ? Object.keys(datos).map(k => ({id:k, ...datos[k]})) : [];
                listaPracticas.reverse();
                extraerTemas();
                dibujarPracticas(listaPracticas);
            });
        }
        function dibujarPracticas(l) {
            let h = "";
            l.forEach(p => h += `<tr><td>${p.fecha || '-'}</td><td>${p.nombre}</td><td>${p.grado}º</td><td>${p.tema}</td><td><b>${p.aciertos}</b></td><td>${p.fallos}</td><td><button class="btn-delete" onclick="borrarPrac('${p.id}')">🗑️</button></td></tr>`);
            document.getElementById('prac-body').innerHTML = h;
        }
        function extraerTemas() {
            let temas = [...new Set(listaPracticas.map(p => p.tema))].sort();
            let h = '<option value="">📚 Todos los temas</option>';
            temas.forEach(t => h += `<option value="${t}">${t}</option>`);
            document.getElementById('filtro-tema').innerHTML = h;
        }
        function filtrarPracticas() {
            let n = document.getElementById('filtro-prac-nombre').value.toLowerCase(), t = document.getElementById('filtro-tema').value;
            let f = listaPracticas.filter(p => p.nombre.toLowerCase().includes(n) && (t==="" || p.tema===t));
            dibujarPracticas(f);
        }
        function borrarPrac(id) { if(confirm("¿Borrar registro?")) fetch(URL_BASE + `practicas/${id}.json`, {method:"DELETE"}).then(()=>cargarPracticas()); }
    </script>
</body>
</html>
